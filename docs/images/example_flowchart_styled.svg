  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}

