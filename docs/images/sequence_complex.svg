      <circle cx="497" cy="867" r="11" class="sequenceNumber-circle"/>
      <line x1="919" y1="911" x2="497" y2="911" class="message-line" stroke-dasharray="3,3" stroke-width="1.5" marker-end="url(#arrow-filled)"/>
