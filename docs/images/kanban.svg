<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="405" height="172" viewBox="0 0 405 172" class="mermaid">
  <style>

.sections {
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.section {
  fill: #f0f0f0;
  stroke: #ccc;
  stroke-width: 1px;
}

.section-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
  font-weight: bold;
}

.items {
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.node rect, .kanban-item {
  fill: white;
  stroke: #9370DB;
  stroke-width: 1px;
}

.kanban-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
}

.kanban-ticket {
  fill: #666;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.kanban-assigned {
  fill: #666;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.priority-indicator {
  stroke-linecap: round;
}


.section-1 {
  fill: hsl(80, 100%, 86.3%);
  stroke: hsl(80, 100%, 86.3%);
  stroke-width: 1px;
}

.section-2 {
  fill: hsl(270, 100%, 86.3%);
  stroke: hsl(270, 100%, 86.3%);
  stroke-width: 1px;
}

.section-3 {
  fill: hsl(300, 100%, 86.3%);
  stroke: hsl(300, 100%, 86.3%);
  stroke-width: 1px;
}

.section-4 {
  fill: hsl(330, 100%, 86.3%);
  stroke: hsl(330, 100%, 86.3%);
  stroke-width: 1px;
}

.section-5 {
  fill: hsl(0, 100%, 86.3%);
  stroke: hsl(0, 100%, 86.3%);
  stroke-width: 1px;
}

.section-6 {
  fill: hsl(30, 100%, 86.3%);
  stroke: hsl(30, 100%, 86.3%);
  stroke-width: 1px;
}

.section-7 {
  fill: hsl(90, 100%, 86.3%);
  stroke: hsl(90, 100%, 86.3%);
  stroke-width: 1px;
}

.section-8 {
  fill: hsl(150, 100%, 86.3%);
  stroke: hsl(150, 100%, 86.3%);
  stroke-width: 1px;
}

.section-9 {
  fill: hsl(180, 100%, 86.3%);
  stroke: hsl(180, 100%, 86.3%);
  stroke-width: 1px;
}

.section-10 {
  fill: hsl(210, 100%, 86.3%);
  stroke: hsl(210, 100%, 86.3%);
  stroke-width: 1px;
}

.section-11 {
  fill: hsl(240, 100%, 86.3%);
  stroke: hsl(240, 100%, 86.3%);
  stroke-width: 1px;
}

.section-12 {
  fill: hsl(60, 100%, 86.3%);
  stroke: hsl(60, 100%, 86.3%);
  stroke-width: 1px;
}


  </style>
  <g class="root">
    <g class="clusters">

    </g>
    <g class="edgePaths">

    </g>
    <g class="edgeLabels">

    </g>
    <g class="nodes">
      <g class="sections">
        <g class="cluster section-1" id="id1">
          <rect x="0" y="0" width="200" height="152" rx="5" ry="5" class="section section-1 " style=""/>
          <text x="100" y="22" class="section-label" text-anchor="middle" dominant-baseline="middle">Todo</text>
        </g>
        <g class="cluster section-2" id="id2">
          <rect x="205" y="0" width="200" height="103" rx="5" ry="5" class="section section-2 " style=""/>
          <text x="305" y="22" class="section-label" text-anchor="middle" dominant-baseline="middle">In Progress</text>
        </g>
      </g>
      <g class="items">
        <g class="node kanban-item-group" transform="translate(7.5, 25)">
          <rect x="0" y="0" width="185" height="44" rx="5" ry="5" class="kanban-item " style=""/>
          <text x="92.5" y="22" class="kanban-label" text-anchor="middle" dominant-baseline="middle">Create Documentation</text>
        </g>
        <g class="node kanban-item-group" transform="translate(7.5, 74)">
          <rect x="0" y="0" width="185" height="68" rx="5" ry="5" class="kanban-item " style=""/>
          <text x="92.5" y="10" text-anchor="middle" class="kanban-label"><tspan x="92.5" dy="0.5em">Create Blog about the</tspan><tspan x="92.5" dy="1.2em">new diagram</tspan></text>
        </g>
        <g class="node kanban-item-group" transform="translate(212.5, 25)">
          <rect x="0" y="0" width="185" height="68" rx="5" ry="5" class="kanban-item " style=""/>
          <text x="92.5" y="10" text-anchor="middle" class="kanban-label"><tspan x="92.5" dy="0.5em">Create renderer for</tspan><tspan x="92.5" dy="1.2em">all cases</tspan></text>
        </g>
      </g>
    </g>
  </g>
</svg>
