<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="700" viewBox="0 0 700 700" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.edge-label-bg {
  fill: rgba(232, 232, 232, 0.8);
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.radarGraticule {
    fill: #DEDEDE;
    fill-opacity: 0.3;
    stroke: #DEDEDE;
    stroke-width: 1px;
}

.radarAxisLine {
    stroke: #333333;
    stroke-width: 2px;
}

.radarAxisLabel {
    font-family: trebuchet ms, verdana, arial, sans-serif;
    font-size: 12px;
    fill: #333333;
}

.radarTitle {
    font-family: trebuchet ms, verdana, arial, sans-serif;
    font-size: 16px;
    font-weight: bold;
    fill: #333333;
}

.radarLegendText {
    font-family: trebuchet ms, verdana, arial, sans-serif;
    font-size: 12px;
    fill: #333333;
}

[class^="radarCurve-"] {
    fill-opacity: 0.5;
    stroke-width: 2px;
}

.radarCurve-0 {
    fill: #8686FF;
    stroke: #8686FF;
}
.radarLegendBox-0 {
    fill: #8686FF;
    stroke: #8686FF;
}
.radarCurve-1 {
    fill: #FFFF78;
    stroke: #FFFF78;
}
.radarLegendBox-1 {
    fill: #FFFF78;
    stroke: #FFFF78;
}
.radarCurve-2 {
    fill: #9FFF9F;
    stroke: #9FFF9F;
}
.radarLegendBox-2 {
    fill: #9FFF9F;
    stroke: #9FFF9F;
}
.radarCurve-3 {
    fill: #C986FF;
    stroke: #C986FF;
}
.radarLegendBox-3 {
    fill: #C986FF;
    stroke: #C986FF;
}
.radarCurve-4 {
    fill: #FF86FF;
    stroke: #FF86FF;
}
.radarLegendBox-4 {
    fill: #FF86FF;
    stroke: #FF86FF;
}
.radarCurve-5 {
    fill: #FF86C9;
    stroke: #FF86C9;
}
.radarLegendBox-5 {
    fill: #FF86C9;
    stroke: #FF86C9;
}
.radarCurve-6 {
    fill: #FF8686;
    stroke: #FF8686;
}
.radarLegendBox-6 {
    fill: #FF8686;
    stroke: #FF8686;
}
.radarCurve-7 {
    fill: #FFC986;
    stroke: #FFC986;
}
.radarLegendBox-7 {
    fill: #FFC986;
    stroke: #FFC986;
}


  </style>
