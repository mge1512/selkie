<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="500" viewBox="0 0 700 500" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.edge-label-bg {
  fill: rgba(232, 232, 232, 0.8);
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.xychart-background {
  fill: #ffffff;
}

.xychart-title {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.xychart-axis {
  stroke: #333333;
  stroke-width: 2px;
}

.xychart-axis-title {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.xychart-axis-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.xychart-tick {
  stroke: #333333;
  stroke-width: 2px;
}

.xychart-bar {
  stroke-width: 0;
}

.xychart-line {
  fill: none;
  stroke-width: 2px;
}

.xychart-point {
  stroke-width: 1px;
}

  </style>
