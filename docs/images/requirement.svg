<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="553.625" height="660" viewBox="0 0 553.625 660" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.edge-label-bg {
  fill: rgba(232, 232, 232, 0.8);
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.requirement-box {
  fill: #ECECFF;
  stroke: #9370DB;
}

.requirement-header {
  fill: #ECECFF;
  stroke: #9370DB;
}

.requirement-type {
  fill: #131300;
  font-weight: bold;
}

.requirement-name {
  fill: #131300;
}

.requirement-attr {
  fill: #333333;
}

.element-box {
  fill: #ECECFF;
  stroke: #9370DB;
}

.element-header {
  fill: #ECECFF;
  stroke: #9370DB;
}

.element-type {
  fill: #131300;
  font-weight: bold;
}

.element-name {
  fill: #131300;
}

.element-attr {
  fill: #333333;
}

.divider {
  stroke: #9370DB;
}

.relationship-line {
  fill: none;
  stroke: #333333;
  stroke-width: 1;
}

.relationship-label {
  fill: black;
}

.relationship-label-bg {
  fill: rgba(232, 232, 232, 0.8);
  stroke: none;
}

.marker {
  fill: #333333;
  stroke: none;
}

.error-icon {
  fill: #552222;
}

.error-text {
  fill: #552222;
  stroke: #552222;
}

.label {
  fill: #333;
}

  </style>
