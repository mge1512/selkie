<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="784" height="580" viewBox="0 0 784 580" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.edge-label-bg {
  fill: rgba(232, 232, 232, 0.8);
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.titleText {
  text-anchor: middle;
  font-size: 18px;
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.section {
  stroke: none;
  opacity: 0.2;
}

.section0 {
  fill: rgba(102, 102, 255, 0.49);
}

.section2 {
  fill: #fff400;
}

.section1, .section3 {
  fill: #ffffff;
  opacity: 0.2;
}

.sectionTitle {
  text-anchor: start;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.sectionTitle0, .sectionTitle1, .sectionTitle2, .sectionTitle3 {
  fill: #333333;
}

.grid .tick {
  stroke: lightgrey;
  opacity: 0.8;
  shape-rendering: crispEdges;
}

.grid .tick text {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  fill: #333333;
}

.grid path {
  stroke-width: 0;
}

.today {
  fill: none;
  stroke: red;
  stroke-width: 2px;
}

.task {
  stroke-width: 2;
}

.taskText {
  text-anchor: middle;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.taskTextOutsideRight {
  fill: black;
  text-anchor: start;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.taskTextOutsideLeft {
  fill: black;
  text-anchor: end;
}

.taskText0, .taskText1, .taskText2, .taskText3 {
  fill: #ffffff;
}

.task0, .task1, .task2, .task3 {
  fill: #8a90dd;
  stroke: #534fbc;
}

.taskTextOutside0, .taskTextOutside2 {
  fill: black;
}

.taskTextOutside1, .taskTextOutside3 {
  fill: black;
}

.active0, .active1, .active2, .active3 {
  fill: #bfc7ff;
  stroke: #534fbc;
}

.activeText0, .activeText1, .activeText2, .activeText3 {
  fill: #000000 !important;
}

.done0, .done1, .done2, .done3 {
  stroke: grey;
  fill: lightgrey;
  stroke-width: 2;
}

.doneText0, .doneText1, .doneText2, .doneText3 {
  fill: #000000 !important;
}

.crit0, .crit1, .crit2, .crit3 {
  stroke: #ff8888;
  fill: red;
  stroke-width: 2;
}

.activeCrit0, .activeCrit1, .activeCrit2, .activeCrit3 {
  stroke: #ff8888;
  fill: #bfc7ff;
  stroke-width: 2;
}

.doneCrit0, .doneCrit1, .doneCrit2, .doneCrit3 {
  stroke: #ff8888;
  fill: lightgrey;
  stroke-width: 2;
}

.milestone {
  transform: rotate(45deg) scale(0.8,0.8);
}

.milestoneText {
  font-style: italic;
}

.doneCritText0, .doneCritText1, .doneCritText2, .doneCritText3 {
  fill: #000000 !important;
}

.activeCritText0, .activeCritText1, .activeCritText2, .activeCritText3 {
  fill: #000000 !important;
}

.vert {
  stroke: navy;
}

.vertText {
  font-size: 15px;
  text-anchor: middle;
  fill: navy !important;
}

/* critText does not need a separate fill rule - it inherits white from taskText,
   which provides good contrast on red crit task backgrounds. The critText class
   exists only for programmatic identification, not styling. */

  </style>
