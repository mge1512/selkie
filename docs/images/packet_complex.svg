<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1026" height="423" viewBox="0 0 1026 423" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.edge-label-bg {
  fill: rgba(232, 232, 232, 0.8);
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.packetByte {
    font-size: 10px;
}
.packetByte.start {
    fill: black;
}
.packetByte.end {
    fill: black;
}
.packetLabel {
    fill: black;
    font-size: 12px;
}
.packetTitle {
    fill: black;
    font-size: 14px;
}
.packetBlock {
    stroke: black;
    stroke-width: 1;
    fill: #efefef;
}

  </style>
  <g class="root">
    <g class="clusters">

    </g>
    <g class="edgePaths">

    </g>
    <g class="edgeLabels">

    </g>
    <g class="nodes">

    </g>
