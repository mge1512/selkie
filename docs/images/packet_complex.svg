    <text x="1020" y="342" class="packetByte end" text-anchor="end" dominant-baseline="auto">255</text>
    <text x="513" y="399.5" class="packetTitle" dominant-baseline="middle" text-anchor="middle">TCP Packet Structure</text>
  </g>
</svg>
