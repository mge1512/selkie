<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="672" height="775" viewBox="0 0 672 775" class="mermaid">
  <style>

.c4-element-group {
  cursor: pointer;
}

.c4-element, .c4-person-body {
  stroke: rgba(0,0,0,0.3);
  stroke-width: 1px;
}

.c4-person-head {
  stroke: rgba(0,0,0,0.3);
  stroke-width: 1px;
}

.c4-db-top, .c4-db-body, .c4-db-bottom {
  stroke: rgba(0,0,0,0.3);
  stroke-width: 1px;
}

.c4-queue {
  stroke: rgba(0,0,0,0.3);
  stroke-width: 1px;
}

.c4-boundary {
  fill: none;
}

.c4-label, .c4-technology, .c4-description {
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.c4-boundary-label {
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.c4-rel-label, .c4-rel-technology {
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.c4-relationship {
  stroke-linecap: round;
}

  </style>
  <defs>
    <marker id="c4-arrow" refX="9" refY="5" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#666666"/>
</marker>
    <marker id="c4-arrow-reverse" refX="1" refY="5" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto">
    <path d="M 10 0 L 0 5 L 10 10 z" fill="#666666"/>
</marker>
  </defs>
  <g class="root">
    <g class="clusters">

    </g>
    <g class="edgePaths">

    </g>
    <g class="edgeLabels">

    </g>
    <g class="nodes">

    </g>
    <text x="336" y="25" class="c4-title" fill="#333333" text-anchor="middle" font-weight="bold" font-size="16">System Context diagram for Internet Banking System</text>
    <g class="c4-boundary-group" id="b0">
      <rect x="316" y="269" width="256" height="406" rx="2.5" ry="2.5" class="c4-boundary" fill="none" stroke-width="1" stroke-dasharray="7,7" stroke="#444444"/>
      <text x="326" y="289" class="c4-boundary-label" font-weight="bold" font-size="14" fill="#444444">BankBoundary</text>
      <text x="326" y="304" class="c4-boundary-type" font-size="12" fill="#444444">[ENTERPRISE]</text>
    </g>
    <g class="c4-element-group" id="email">
      <rect x="50" y="50" width="216" height="119" rx="2.5" ry="2.5" class="c4-element" stroke-width="0.5" fill="#999999" stroke="#7a7a7a"/>
      <text x="158" y="68" class="c4-type" fill="#ffffff" font-style="italic" text-anchor="middle" font-size="11">&lt;&lt;external_system&gt;&gt;</text>
      <text x="158" y="84" class="c4-label" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">E-mail System</text>
      <text x="158" y="106" class="c4-description" text-anchor="middle" fill="#ffffff" font-size="11">External e-mail system</text>
    </g>
    <g class="c4-element-group" id="customer">
      <rect x="336" y="319" width="216" height="167" rx="2.5" ry="2.5" class="c4-element" stroke="#073b6f" fill="#08427b" stroke-width="0.5"/>
      <image x="420" y="353" width="48" height="48" href="data:image/png;base64,"/>
      <text x="444" y="337" class="c4-type" font-size="11" fill="#ffffff" font-style="italic" text-anchor="middle">&lt;&lt;person&gt;&gt;</text>
      <text x="444" y="409" class="c4-label" text-anchor="middle" fill="#ffffff" font-weight="bold" font-size="14">Banking Customer</text>
      <text x="444" y="431" class="c4-description" text-anchor="middle" font-size="11" fill="#ffffff">A customer of the bank</text>
    </g>
    <g class="c4-element-group" id="banking">
      <rect x="336" y="536" width="216" height="119" rx="2.5" ry="2.5" class="c4-element" fill="#1168bd" stroke="#0e5a9d" stroke-width="0.5"/>
      <text x="444" y="554" class="c4-type" fill="#ffffff" font-style="italic" font-size="11" text-anchor="middle">&lt;&lt;system&gt;&gt;</text>
      <text x="444" y="570" class="c4-label" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">Internet Banking System</text>
      <text x="444" y="592" class="c4-description" fill="#ffffff" text-anchor="middle" font-size="11">Allows customers to view accounts</text>
    </g>
    <g class="c4-relationship-group">
      <line x1="444" y1="486" x2="444" y2="536" class="c4-relationship" stroke-width="1" stroke="#666666" marker-end="url(#c4-arrow)"/>
      <text x="444" y="515" class="c4-rel-label" font-size="12" text-anchor="middle" fill="#666666">Uses</text>
    </g>
    <g class="c4-relationship-group">
      <path d="M408.9855967078189,536 Q354.99279835390945,352.5 193.01440329218107,169" class="c4-relationship" marker-end="url(#c4-arrow)" stroke-width="1" stroke="#666666" fill="none"/>
      <text x="301" y="356.5" class="c4-rel-label" font-size="12" fill="#666666" text-anchor="middle">Sends e-mails</text>
      <text x="301" y="369.5" class="c4-rel-technology" font-size="12" text-anchor="middle" font-style="italic" fill="#666666">[SMTP]</text>
    </g>
  </g>
</svg>
