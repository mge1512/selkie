<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1225" height="293" viewBox="0 0 1225 293" class="mermaid">
  <style>

.sections {
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.section {
  fill: #f0f0f0;
  stroke: #ccc;
  stroke-width: 1px;
}

.section-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
  font-weight: bold;
}

.items {
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.node rect, .kanban-item {
  fill: white;
  stroke: #9370DB;
  stroke-width: 1px;
}

.kanban-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
}

.kanban-ticket {
  fill: #666;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.kanban-assigned {
  fill: #666;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.priority-indicator {
  stroke-linecap: round;
}


.section-1 {
  fill: hsl(80, 100%, 86.3%);
  stroke: hsl(80, 100%, 86.3%);
  stroke-width: 1px;
}

.section-2 {
  fill: hsl(270, 100%, 86.3%);
  stroke: hsl(270, 100%, 86.3%);
  stroke-width: 1px;
}

.section-3 {
  fill: hsl(300, 100%, 86.3%);
  stroke: hsl(300, 100%, 86.3%);
  stroke-width: 1px;
}

.section-4 {
  fill: hsl(330, 100%, 86.3%);
  stroke: hsl(330, 100%, 86.3%);
  stroke-width: 1px;
}

.section-5 {
  fill: hsl(0, 100%, 86.3%);
