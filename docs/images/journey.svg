<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1250" height="520" viewBox="0 0 1250 520" class="mermaid">
  <style>

.journey-title {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  fill: #333333;
}
.journey-section text {
  font-family: trebuchet ms, verdana, arial, sans-serif;
}
.task {
  cursor: pointer;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}
.task-line {
  stroke: #666;
  stroke-width: 1px;
  stroke-dasharray: 4 2;
}
.face {
  fill: #FFF8DC;
  stroke: #999;
}
.mouth {
  stroke: #666;
}
.legend {
  fill: #333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
}
.label {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  color: #333;
  fill: #333;
}
.activity-line {
  fill: none;
}

.section-type-0 {
  fill: #ececff;
}
.task-type-0 {
  fill: #ececff;
}

.section-type-1 {
  fill: #ffffde;
}
.task-type-1 {
  fill: #ffffde;
}

.section-type-2 {
  fill: #ffecfe;
}
.task-type-2 {
  fill: #ffecfe;
}

.section-type-3 {
  fill: #deffe0;
}
.task-type-3 {
  fill: #deffe0;
}

.section-type-4 {
  fill: #ecfffe;
}
.task-type-4 {
  fill: #ecfffe;
}

.section-type-5 {
  fill: #ffdee0;
}
.task-type-5 {
  fill: #ffdee0;
}

.section-type-6 {
  fill: #ffefec;
}
.task-type-6 {
  fill: #ffefec;
}

.section-type-7 {
  fill: #defbff;
}
.task-type-7 {
  fill: #defbff;
}


.actor-0 {
  fill: #8FBC8F;
}

.actor-1 {
  fill: #7CFC00;
}

.actor-2 {
  fill: #00FFFF;
}

.actor-3 {
  fill: #20B2AA;
}

.actor-4 {
  fill: #B0E0E6;
}

.actor-5 {
  fill: #FFFFE0;
}


  </style>
  <defs>
    <marker id="arrowhead" refX="5" refY="2" markerWidth="6" markerHeight="4" orient="auto">
      <path d="M 0,0 V 4 L6,2 Z"/>
    </marker>
  </defs>
  <g class="root">
    <g class="clusters">

    </g>
    <g class="edgePaths">
      <line x1="150" y1="250" x2="1146" y2="250" class="activity-line" marker-end="url(#arrowhead)" stroke="black" stroke-width="4"/>
    </g>
    <g class="edgeLabels">

    </g>
    <g class="nodes">
      <g class="actor-legend">
        <g class="actor-legend-0">
          <circle cx="20" cy="110" r="7" class="actor-0" stroke="#000" fill="#8FBC8F"/>
          <text x="40" y="117" class="legend" fill="#333" text-anchor="start">Cat</text>
        </g>
        <g class="actor-legend-1">
          <circle cx="20" cy="135" r="7" class="actor-1" stroke="#000" fill="#7CFC00"/>
          <text x="40" y="142" class="legend" fill="#333" text-anchor="start">Me</text>
        </g>
      </g>
      <g class="journey-sections">
        <g>
