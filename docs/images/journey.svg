        </g>
        <g>
          <rect x="750" y="100" width="350" height="50" rx="3" ry="3" class="journey-section section-type-1" fill="#8B008B"/>
          <text x="925" y="130" class="label" text-anchor="middle" dominant-baseline="middle">Go home</text>
        </g>
      </g>
