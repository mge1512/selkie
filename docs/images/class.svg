<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="260" height="234" viewBox="0 0 260 234" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 12px;
}

.edge-label-bg {
  fill: #ffffff;
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.class-box {
  fill: #ECECFF;
  stroke: #333333;
}

.class-name {
  fill: #333333;
  font-weight: bold;
}

.class-annotation {
  fill: #666666;
  font-style: italic;
}

.class-member {
  fill: #333333;
}

.class-method {
  fill: #333333;
}

.relation-line {
  stroke: #333333;
}

.relation-label {
  fill: #333333;
}

.note-box {
  fill: #FFFFCC;
  stroke: #333333;
}

.note-text {
  fill: #333333;
}

  </style>
  <defs>
    <marker id="inheritance" viewBox="0 0 20 14" refX="18" refY="7" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 1 7 L 18 13 V 1 Z" fill="none" stroke="#333333" stroke-width="1"/>
    </marker>
    <marker id="aggregation" viewBox="0 0 20 14" refX="18" refY="7" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 18 7 L 9 13 L 1 7 L 9 1 Z" fill="none" stroke="#333333" stroke-width="1"/>
    </marker>
    <marker id="composition" viewBox="0 0 20 14" refX="18" refY="7" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 18 7 L 9 13 L 1 7 L 9 1 Z" stroke="#333333" fill="#333333" stroke-width="1"/>
    </marker>
    <marker id="dependency" viewBox="0 0 20 20" refX="20" refY="10" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 20 10 L 0 20" stroke="#333333" stroke-width="1" fill="none"/>
    </marker>
    <marker id="lollipop" viewBox="0 0 20 20" refX="10" refY="10" markerWidth="10" markerHeight="10" orient="auto">
      <circle cx="10" cy="10" r="8" stroke-width="1" fill="#FFFFFF" stroke="#333333"/>
    </marker>
  </defs>
  <g class="root">
    <g class="clusters">

    </g>
    <g class="edgePaths">

    </g>
    <g class="edgeLabels">

    </g>
    <g class="nodes">

    </g>
    <g class="class-node" id="class-Animal">
      <rect x="80" y="0" width="100" height="86" rx="3" ry="3" class="class-box" fill="#ECECFF" stroke="#333333" stroke-width="1"/>
      <text x="130" y="20" class="class-name" font-size="14" font-weight="bold" text-anchor="middle">Animal</text>
      <line x1="80" y1="30" x2="180" y2="30" stroke-width="1" stroke="#333333"/>
      <text x="90" y="54" class="class-member" font-size="12" text-anchor="start">+String name</text>
      <line x1="80" y1="63" x2="180" y2="63" stroke-width="1" stroke="#333333"/>
      <text x="90" y="77" class="class-method" font-size="12" text-anchor="start">+eat()</text>
    </g>
    <g class="class-node" id="class-Cat">
      <rect x="0" y="166" width="100" height="68" rx="3" ry="3" class="class-box" stroke-width="1" fill="#ECECFF" stroke="#333333"/>
      <text x="50" y="186" class="class-name" text-anchor="middle" font-size="14" font-weight="bold">Cat</text>
      <line x1="0" y1="196" x2="100" y2="196" stroke-width="1" stroke="#333333"/>
      <text x="10" y="220" class="class-method" text-anchor="start" font-size="12">+meow()</text>
    </g>
    <g class="class-node" id="class-Dog">
      <rect x="160" y="166" width="100" height="68" rx="3" ry="3" class="class-box" stroke="#333333" fill="#ECECFF" stroke-width="1"/>
      <text x="210" y="186" class="class-name" text-anchor="middle" font-size="14" font-weight="bold">Dog</text>
      <line x1="160" y1="196" x2="260" y2="196" stroke="#333333" stroke-width="1"/>
      <text x="170" y="220" class="class-method" text-anchor="start" font-size="12">+bark()</text>
    </g>
    <g class="relation">
      <path d="M 171.44578313253012 86 L 210 126 L 210 166" class="relation-line" fill="none" marker-start="url(#inheritance)" stroke="#333333" stroke-width="1"/>
    </g>
    <g class="relation">
      <path d="M 88.55421686746988 86 L 50 126 L 50 166" class="relation-line" fill="none" stroke-width="1" stroke="#333333" marker-start="url(#inheritance)"/>
    </g>
  </g>
</svg>
