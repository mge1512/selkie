<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="5000" height="780" viewBox="0 0 5000 780" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 12px;
}

.edge-label-bg {
  fill: #ffffff;
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.titleText {
  text-anchor: middle;
  font-size: 18px;
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.section {
  stroke: none;
  opacity: 0.2;
}

.section0, .section2 {
  fill: #fff400;
}

.section1, .section3 {
  fill: #ffffff;
}

.sectionTitle {
  text-anchor: start;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  fill: #333333;
}

.task {
  stroke-width: 2;
}

.task0, .task1, .task2, .task3 {
  fill: #8a90dd;
  stroke: #534fbc;
}

.taskText {
  text-anchor: middle;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.taskText0, .taskText1, .taskText2, .taskText3 {
  fill: #ffffff;
}

.active0, .active1, .active2, .active3 {
  fill: #bfc7ff;
  stroke: #534fbc;
}

.activeText0, .activeText1, .activeText2, .activeText3 {
  fill: #000000 !important;
}

.done0, .done1, .done2, .done3 {
  fill: #d3d3d3;
  stroke: #808080;
  stroke-width: 2;
}

.doneText0, .doneText1, .doneText2, .doneText3 {
  fill: #000000 !important;
}

.crit0, .crit1, .crit2, .crit3 {
  fill: #ff0000;
  stroke: #ff8888;
  stroke-width: 2;
}

.milestone {
  fill: #8a90dd;
  stroke: #534fbc;
}

.grid .tick {
  stroke: #d3d3d3;
  opacity: 0.8;
  shape-rendering: crispEdges;
}

.tick-mark {
  stroke: #333333;
  stroke-width: 1;
}

.grid path {
  stroke-width: 0;
}

.timeline-bg {
  fill: #ffffff;
  stroke: #d3d3d3;
  stroke-width: 1;
}

.axis-line {
  stroke: #333333;
  stroke-width: 1;
}

.axis-label {
  fill: #333333;
}

.today-line {
  stroke: #ff0000;
  stroke-width: 2;
}

  </style>
