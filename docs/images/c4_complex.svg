<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="938" height="1163" viewBox="0 0 938 1163" class="mermaid">
  <style>

.c4-element-group {
  cursor: pointer;
}

.c4-element, .c4-person-body {
  stroke: rgba(0,0,0,0.3);
  stroke-width: 1px;
}

.c4-person-head {
  stroke: rgba(0,0,0,0.3);
  stroke-width: 1px;
}

.c4-db-top, .c4-db-body, .c4-db-bottom {
  stroke: rgba(0,0,0,0.3);
  stroke-width: 1px;
}

.c4-queue {
  stroke: rgba(0,0,0,0.3);
  stroke-width: 1px;
}

.c4-boundary {
  fill: none;
}

.c4-label, .c4-technology, .c4-description {
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.c4-boundary-label {
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.c4-rel-label, .c4-rel-technology {
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.c4-relationship {
  stroke-linecap: round;
}

  </style>
  <defs>
    <marker id="c4-arrow" refX="9" refY="5" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#666666"/>
</marker>
    <marker id="c4-arrow-reverse" refX="1" refY="5" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto">
    <path d="M 10 0 L 0 5 L 10 10 z" fill="#666666"/>
</marker>
  </defs>
  <g class="root">
    <g class="clusters">

    </g>
    <g class="edgePaths">

    </g>
    <g class="edgeLabels">

    </g>
    <g class="nodes">

    </g>
    <text x="469" y="25" class="c4-title" text-anchor="middle" font-size="16" font-weight="bold" fill="#333333">Container diagram for Internet Banking System</text>
    <g class="c4-boundary-group" id="c1">
      <rect x="582" y="317" width="256" height="746" rx="2.5" ry="2.5" class="c4-boundary" fill="none" stroke="#444444" stroke-width="1" stroke-dasharray="7,7"/>
      <text x="592" y="337" class="c4-boundary-label" font-weight="bold" font-size="14" fill="#444444">Internet Banking</text>
      <text x="592" y="352" class="c4-boundary-type" font-size="12" fill="#444444">[CONTAINER]</text>
    </g>
    <g class="c4-element-group" id="email_system">
      <rect x="50" y="50" width="216" height="119" rx="2.5" ry="2.5" class="c4-element" stroke-width="0.5" fill="#999999" stroke="#7a7a7a"/>
      <text x="158" y="68" class="c4-type" fill="#ffffff" font-style="italic" text-anchor="middle" font-size="11">&lt;&lt;external_system&gt;&gt;</text>
      <text x="158" y="84" class="c4-label" text-anchor="middle" fill="#ffffff" font-weight="bold" font-size="14">E-Mail System</text>
      <text x="158" y="106" class="c4-description" text-anchor="middle" fill="#ffffff" font-size="11">The internal Microsoft Exchange system</text>
    </g>
    <g class="c4-element-group" id="customer">
      <rect x="316" y="50" width="216" height="167" rx="2.5" ry="2.5" class="c4-element" fill="#08427b" stroke="#073b6f" stroke-width="0.5"/>
      <image x="400" y="84" width="48" height="48" href="data:image/png;base64,"/>
      <text x="424" y="68" class="c4-type" fill="#ffffff" text-anchor="middle" font-size="11" font-style="italic">&lt;&lt;person&gt;&gt;</text>
      <text x="424" y="140" class="c4-label" text-anchor="middle" font-weight="bold" fill="#ffffff" font-size="14">Customer</text>
      <text x="424" y="162" class="c4-description" text-anchor="middle" fill="#ffffff" font-size="11">A customer of the bank, with personal bank accounts</text>
    </g>
    <g class="c4-element-group" id="spa">
      <rect x="602" y="417" width="216" height="119" rx="2.5" ry="2.5" class="c4-element" stroke-width="0.5" fill="#438dd5" stroke="#3879b8"/>
      <text x="710" y="435" class="c4-type" text-anchor="middle" font-style="italic" font-size="11" fill="#ffffff">&lt;&lt;container&gt;&gt;</text>
      <text x="710" y="451" class="c4-label" fill="#ffffff" font-weight="bold" font-size="14" text-anchor="middle">Single-Page App</text>
      <text x="710" y="467" class="c4-technology" font-size="11" fill="#ffffff" font-style="italic" text-anchor="middle">[JavaScript, Angular]</text>
      <text x="710" y="487" class="c4-description" font-size="11" fill="#ffffff" text-anchor="middle">Provides all the Internet banking functionality</text>
    </g>
    <g class="c4-element-group" id="api">
      <rect x="602" y="586" width="216" height="119" rx="2.5" ry="2.5" class="c4-element" fill="#438dd5" stroke="#3879b8" stroke-width="0.5"/>
      <text x="710" y="604" class="c4-type" fill="#ffffff" font-style="italic" text-anchor="middle" font-size="11">&lt;&lt;container&gt;&gt;</text>
      <text x="710" y="620" class="c4-label" fill="#ffffff" font-weight="bold" text-anchor="middle" font-size="14">API Application</text>
      <text x="710" y="636" class="c4-technology" text-anchor="middle" font-size="11" fill="#ffffff" font-style="italic">[Java, Spring MVC]</text>
      <text x="710" y="656" class="c4-description" fill="#ffffff" text-anchor="middle" font-size="11">Provides banking functionality via JSON/HTTPS API</text>
    </g>
    <g class="c4-element-group" id="db">
      <path d="M602,755c0,-10 108,-10 108,-10c0,0 108,0 108,10l0,119c0,10 -108,-10 -108,-10c0,0 -108,0 -108,-10l0,-119" class="c4-db" stroke-width="0.5" fill="#438dd5" stroke="#3879b8"/>
      <path d="M602,755c0,10 108,10 108,10c0,0 108,0 108,-10" class="c4-db-top" stroke="#3879b8" fill="none" stroke-width="0.5"/>
      <text x="710" y="773" class="c4-type" font-style="italic" font-size="11" fill="#ffffff" text-anchor="middle">&lt;&lt;container_db&gt;&gt;</text>
      <text x="710" y="789" class="c4-label" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">Database</text>
      <text x="710" y="805" class="c4-technology" fill="#ffffff" text-anchor="middle" font-size="11" font-style="italic">[Oracle]</text>
      <text x="710" y="825" class="c4-description" font-size="11" text-anchor="middle" fill="#ffffff">Stores user data, accounts, transactions</text>
    </g>
    <g class="c4-element-group" id="queue">
      <path d="M602,924l216,0c5,0 5,59.5 5,59.5c0,0 0,59.5 -5,59.5l-216,0c-5,0 -5,-59.5 -5,-59.5c0,0 0,-59.5 5,-59.5" class="c4-queue" stroke-width="0.5" fill="#438dd5" stroke="#3879b8"/>
      <path d="M818,924c-5,0 -5,59.5 -5,59.5c0,59.5 5,59.5 5,59.5" class="c4-queue-right" stroke-width="0.5" fill="none" stroke="#3879b8"/>
      <text x="710" y="942" class="c4-type" font-style="italic" font-size="11" fill="#ffffff" text-anchor="middle">&lt;&lt;container_queue&gt;&gt;</text>
      <text x="710" y="958" class="c4-label" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Message Broker</text>
      <text x="710" y="974" class="c4-technology" text-anchor="middle" font-size="11" fill="#ffffff" font-style="italic">[RabbitMQ]</text>
      <text x="710" y="994" class="c4-description" text-anchor="middle" fill="#ffffff" font-size="11">Handles async messaging</text>
    </g>
    <g class="c4-relationship-group">
      <line x1="493.62390670553935" y1="217" x2="660.3877551020408" y2="417" class="c4-relationship" stroke-width="1" marker-end="url(#c4-arrow)" stroke="#666666"/>
      <text x="577.0058309037901" y="321" class="c4-rel-label" font-size="12" text-anchor="middle" fill="#666666">Uses</text>
      <text x="577.0058309037901" y="334" class="c4-rel-technology" font-size="12" text-anchor="middle" font-style="italic" fill="#666666">[HTTPS]</text>
    </g>
    <g class="c4-relationship-group">
      <path d="M710,536 Q710,561 710,586" class="c4-relationship" marker-end="url(#c4-arrow)" fill="none" stroke="#666666" stroke-width="1"/>
      <text x="710" y="565" class="c4-rel-label" font-size="12" fill="#666666" text-anchor="middle">Makes API calls to</text>
      <text x="710" y="578" class="c4-rel-technology" fill="#666666" font-style="italic" text-anchor="middle" font-size="12">[JSON/HTTPS]</text>
    </g>
    <g class="c4-relationship-group">
      <path d="M710,705 Q710,730 710,755" class="c4-relationship" fill="none" stroke-width="1" marker-end="url(#c4-arrow)" stroke="#666666"/>
      <text x="710" y="734" class="c4-rel-label" font-size="12" fill="#666666" text-anchor="middle">Reads from and writes to</text>
      <text x="710" y="747" class="c4-rel-technology" fill="#666666" font-style="italic" font-size="12" text-anchor="middle">[JDBC]</text>
    </g>
    <g class="c4-relationship-group">
      <path d="M710,705 Q710,814.5 710,924" class="c4-relationship" stroke="#666666" marker-end="url(#c4-arrow)" fill="none" stroke-width="1"/>
      <text x="710" y="818.5" class="c4-rel-label" text-anchor="middle" fill="#666666" font-size="12">Sends messages to</text>
    </g>
    <g class="c4-relationship-group">
      <path d="M266,119.24436090225564 Q278.5,121.5 316,123.75563909774436" class="c4-relationship" stroke-width="1" stroke="#666666" marker-end="url(#c4-arrow)" fill="none"/>
      <text x="291" y="125.5" class="c4-rel-label" fill="#666666" font-size="12" text-anchor="middle">Sends e-mails to</text>
    </g>
  </g>
</svg>
