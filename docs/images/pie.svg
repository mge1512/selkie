<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="450" viewBox="0 0 600 450" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 12px;
}

.edge-label-bg {
  fill: #ffffff;
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.pieCircle {
  stroke: black;
  stroke-width: 2px;
  opacity: 0.7;
}

.pieOuterCircle {
  stroke: black;
  stroke-width: 2px;
  fill: none;
}

.pieTitleText {
  text-anchor: middle;
  font-size: 25px;
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.slice {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  fill: #333333;
  font-size: 17px;
}

.legend text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 17px;
}

  </style>
  <g class="root">
    <g class="clusters">

    </g>
    <g class="edgePaths">

    </g>
    <g class="edgeLabels">

    </g>
    <g class="nodes">

    </g>
    <text x="210" y="25" class="pie-title" font-size="20" text-anchor="middle" font-weight="bold">Languages</text>
    <circle cx="210" cy="245" r="186" class="pieOuterCircle" fill="none" stroke="black" stroke-width="2"/>
    <path d="M 210 245 L 210 60 A 185 185 0 0 1 267.1681439593653 420.9454555146034 Z" class="pieCircle" stroke="black" fill="#ECECFF" stroke-width="2" opacity="0.7"/>
    <text x="347.04175725757534" y="223.29471797566796" class="slice" font-size="17" dominant-baseline="middle" text-anchor="middle">45%</text>
    <path d="M 210 245 L 267.1681439593653 420.9454555146034 A 185 185 0 0 1 25 245.00000000000003 Z" class="pieCircle" fill="#ffffde" opacity="0.7" stroke-width="2" stroke="black"/>
    <text x="128.44479624441936" y="357.25110796952396" class="slice" text-anchor="middle" dominant-baseline="middle" font-size="17">30%</text>
    <path d="M 210 245 L 25 245.00000000000003 A 185 185 0 0 1 209.99999999999997 60 Z" class="pieCircle" fill="#b9b9ff" stroke="black" stroke-width="2" opacity="0.7"/>
    <text x="111.8889341103665" y="146.88893411036653" class="slice" text-anchor="middle" dominant-baseline="middle" font-size="17">25%</text>
    <g class="legend">
      <rect x="430" y="175" width="18" height="18" class="legend" fill="#ECECFF" stroke="#ECECFF"/>
      <text x="452" y="189" class="legend" font-size="17">Rust</text>
      <rect x="430" y="197" width="18" height="18" class="legend" fill="#ffffde" stroke="#ffffde"/>
      <text x="452" y="211" class="legend" font-size="17">TypeScript</text>
      <rect x="430" y="219" width="18" height="18" class="legend" fill="#b9b9ff" stroke="#b9b9ff"/>
      <text x="452" y="233" class="legend" font-size="17">Python</text>
    </g>
  </g>
</svg>
