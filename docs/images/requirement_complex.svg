  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
