<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.edge-label-bg {
  fill: rgba(232, 232, 232, 0.8);
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.sankey-node {
  stroke: none;
}

.sankey-link {
  stroke-opacity: 0.5;
}

.sankey-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.link {
  mix-blend-mode: multiply;
}

  </style>
  <defs>
    <linearGradient id="linearGradient-1" gradientUnits="userSpaceOnUse" x1="10" x2="196.66666666666666"><stop offset="0%" stop-color="#4e79a7"/><stop offset="100%" stop-color="#f28e2c"/></linearGradient>
    <linearGradient id="linearGradient-2" gradientUnits="userSpaceOnUse" x1="206.66666666666666" x2="393.3333333333333"><stop offset="0%" stop-color="#f28e2c"/><stop offset="100%" stop-color="#e15759"/></linearGradient>
    <linearGradient id="linearGradient-3" gradientUnits="userSpaceOnUse" x1="403.3333333333333" x2="590"><stop offset="0%" stop-color="#e15759"/><stop offset="100%" stop-color="#76b7b2"/></linearGradient>
  </defs>
  <g class="root">
    <g class="clusters">

    </g>
    <g class="edgePaths">

    </g>
    <g class="edgeLabels">

    </g>
    <g class="nodes">

    </g>
