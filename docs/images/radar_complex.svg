<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.edge-label-bg {
  fill: rgba(232, 232, 232, 0.8);
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.radarGraticule {
    fill: none;
    stroke: #999999;
    stroke-width: 1px;
    stroke-opacity: 0.3;
}

.radarAxisLine {
    stroke: #333333;
    stroke-width: 1px;
}

.radarAxisLabel {
    font-family: trebuchet ms, verdana, arial, sans-serif;
    font-size: 12px;
    fill: #333333;
}

.radarTitle {
    font-family: trebuchet ms, verdana, arial, sans-serif;
    font-size: 16px;
    font-weight: bold;
    fill: #333333;
}

.radarLegendText {
    font-family: trebuchet ms, verdana, arial, sans-serif;
    font-size: 12px;
    fill: #333333;
}

[class^="radarCurve-"] {
    fill-opacity: 0.3;
    stroke-width: 2px;
}

  </style>
