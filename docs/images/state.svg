<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="192.21381692786537" height="384" viewBox="3 -8 192.21381692786537 384" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.edge-label-bg {
  fill: rgba(232, 232, 232, 0.8);
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.state-title {
  fill: #333333;
}

.state-box {
  fill: #ECECFF;
  stroke: #9370DB;
}

.state-label {
  fill: #333333;
}

.state-description {
  fill: #666666;
}

.state-start {
  fill: #333333;
}

.state-end-outer {
  fill: none;
  stroke: #9370DB;
  stroke-width: 2;
}

.state-end-inner {
  fill: #9370DB;
  stroke: #9370DB;
  stroke-width: 2;
}

.state-fork-join {
  fill: #333333;
}

.state-choice {
  fill: #ECECFF;
  stroke: #333333;
}

.state-divider {
  stroke: #333333;
  stroke-dasharray: 5, 5;
  fill: none;
}

.transition-path {
  stroke: #333333;
  fill: none;
}

.transition-label {
  fill: #333333;
}

.transition-label-bg {
  fill: rgba(232, 232, 232, 0.8);
  stroke: none;
}

.note-box {
  fill: #FFFFCC;
  stroke: #333333;
}

.note-text {
  fill: #333333;
}

.state-composite-outer {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.state-composite-inner {
  fill: #ffffff;
  stroke: none;
}

.state-composite-inner-alt {
  fill: #f0f0f0;
  stroke: none;
}

.state-composite-label {
  fill: #333333;
  font-weight: bold;
}

.state-composite-divider {
  stroke: #9370DB;
  stroke-width: 1px;
  fill: none;
}

  </style>
