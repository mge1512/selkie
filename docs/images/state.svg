  stroke: #9370DB;
  stroke-width: 2;
}

.state-end-inner {
  fill: #9370DB;
  stroke: #9370DB;
  stroke-width: 2;
}

.state-fork-join {
  fill: #333333;
}

.state-choice {
  fill: #ECECFF;
  stroke: #333333;
}

.state-divider {
  stroke: #333333;
  stroke-dasharray: 5, 5;
}

.transition-path {
  stroke: #333333;
  fill: none;
}

.transition-label {
  fill: #333333;
}

.transition-label-bg {
  fill: rgba(232, 232, 232, 0.8);
  stroke: none;
}

.note-box {
  fill: #FFFFCC;
  stroke: #333333;
}

.note-text {
  fill: #333333;
}

.state-composite-outer {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.state-composite-inner {
  fill: #ffffff;
  stroke: none;
}

.state-composite-inner-alt {
  fill: #f0f0f0;
  stroke: none;
}

.state-composite-label {
  fill: #333333;
  font-weight: bold;
}

.state-composite-divider {
  stroke: #9370DB;
  stroke-width: 1px;
}

