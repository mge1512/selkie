  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.state-title {
  fill: #333333;
}

.state-box {
  fill: #ECECFF;
  stroke: #9370DB;
}

.state-label {
  fill: #333333;
}

.state-description {
  fill: #666666;
}

.state-start {
  fill: #333333;
}

.state-end-outer {
