<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="672" height="478" viewBox="-50 -10 672 478" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.edge-label-bg {
  fill: rgba(232, 232, 232, 0.8);
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.sequence-title {
  fill: #333333;
}

.actor {
  stroke: #9370DB;
  fill: #ECECFF;
}

.actor-box {
  stroke: #9370DB;
  fill: #ECECFF;
}

/* Actor text - no stroke (avoid outlined appearance) */
text.actor, text.actor > tspan, text.actor-box, text.actor-label {
  fill: #333333;
  stroke: none;
}

.actor-line {
  stroke: #333333;
  stroke-width: 0.5px;
}

.messageLine0 {
  stroke-width: 1.5;
  stroke-dasharray: none;
  stroke: #333333;
}

.messageLine1 {
  stroke-width: 1.5;
  stroke-dasharray: 2, 2;
  stroke: #333333;
}

.message-line {
  stroke: #333333;
}

.messageText {
  fill: #333333;
  stroke: none;
}

.message-label {
  fill: #333333;
  stroke: none;
}

.note {
  stroke: #aaaa33;
  fill: #FFFFCC;
}

.noteText, .noteText > tspan {
  fill: #333333;
  stroke: none;
}

.note-text, .note-text > tspan {
  fill: #333333;
  stroke: none;
}

.activation {
  fill: #eaeaea;
  stroke: #333333;
}

.loopLine {
  stroke: #9370DB;
  fill: none;
  stroke-width: 2px;
  stroke-dasharray: 2, 2;
}

.loopText {
  fill: #333333;
}

.labelBox {
  stroke: #9370DB;
  fill: #ECECFF;
}

.sequence-marker-filled {
  fill: #333333;
  stroke: #333333;
}

.sequence-marker-open {
  fill: none;
  stroke: #333333;
}

.sequence-marker-cross {
  stroke: #333333;
}

.sequence-number {
  fill: #333333;
}

.sequenceNumber-circle {
  fill: #333333;
  stroke: #333333;
}

.sequenceNumber {
  fill: white;
}

  </style>
  <defs>
    <marker id="arrow-filled" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="sequence-marker-filled" stroke-width="1"/>
    </marker>
    <marker id="arrow-open" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10" class="sequence-marker-open" stroke-width="1"/>
    </marker>
    <marker id="arrow-cross" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="12" markerHeight="12" orient="auto">
      <line x1="0" y1="0" x2="10" y2="10" class="sequence-marker-cross" stroke-width="2"/>
      <line x1="10" y1="0" x2="0" y2="10" class="sequence-marker-cross" stroke-width="2"/>
    </marker>
    <marker id="sequencenumber" refX="15" refY="15" markerWidth="60" markerHeight="40" orient="auto">
      <circle cx="15" cy="15" r="6" class="sequence-number"/>
    </marker>
  </defs>
  <g class="root">
    <g class="clusters">
      <rect x="412" y="131" width="170" height="88" rx="3" ry="3" class="loopLine" fill="none"/>
      <line x1="75" y1="65" x2="75" y2="393" class="actor-line" stroke-width="0.5px"/>
      <line x1="286" y1="65" x2="286" y2="393" class="actor-line" stroke-width="0.5px"/>
      <line x1="497" y1="65" x2="497" y2="393" class="actor-line" stroke-width="0.5px"/>
    </g>
    <g class="edgePaths">
      <line x1="75" y1="109" x2="497" y2="109" class="message-line" stroke-width="1.5" marker-end="url(#arrow-filled)"/>
      <path d="M 497 197 L 537 197 L 537 227 L 497 227" class="message-line" marker-end="url(#arrow-filled)" fill="none" stroke-width="1.5"/>
      <line x1="497" y1="285" x2="75" y2="285" class="message-line" marker-end="url(#arrow-filled)" stroke-dasharray="5,5" stroke-width="1.5"/>
      <line x1="497" y1="329" x2="286" y2="329" class="message-line" stroke-width="1.5" marker-end="url(#arrow-filled)"/>
      <line x1="286" y1="373" x2="497" y2="373" class="message-line" marker-end="url(#arrow-filled)" stroke-dasharray="5,5" stroke-width="1.5"/>
    </g>
    <g class="edgeLabels">
      <text x="286" y="99" class="message-label" text-anchor="middle" font-size="16">Hello John, how are you?</text>
      <text x="542" y="212" class="message-label" font-size="16" text-anchor="start">Fight against hypochondria</text>
      <polygon points="422,131 472,131 472,144 464,151 422,151" class="labelBox"/>
      <text x="447" y="144" class="labelText" font-size="16" text-anchor="middle">loop</text>
      <text x="497" y="149" class="loopText" font-size="16" text-anchor="middle">[HealthCheck]</text>
      <text x="286" y="275" class="message-label" text-anchor="middle" font-size="16">Great!</text>
      <text x="391.5" y="319" class="message-label" text-anchor="middle" font-size="16">How about you?</text>
      <text x="391.5" y="363" class="message-label" text-anchor="middle" font-size="16">Jolly good!</text>
    </g>
    <g class="nodes">

    </g>
    <g class="actor">
      <rect x="0" y="0" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1" fill="#eaeaea" stroke="#666"/>
      <text x="75" y="32.5" class="actor actor-box" dominant-baseline="central" text-anchor="middle" font-size="16">Alice</text>
    </g>
    <g class="actor">
      <rect x="211" y="0" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1" fill="#eaeaea" stroke="#666"/>
      <text x="286" y="32.5" class="actor actor-box" font-size="16" text-anchor="middle" dominant-baseline="central">Bob</text>
    </g>
    <g class="actor">
      <rect x="422" y="0" width="150" height="65" rx="3" ry="3" class="actor actor-box" fill="#eaeaea" stroke-width="1" stroke="#666"/>
      <text x="497" y="32.5" class="actor actor-box" dominant-baseline="central" text-anchor="middle" font-size="16">John</text>
    </g>
    <g class="note">
      <path d="M 517 212 L 609 212 L 617 220 L 617 270 L 517 270 Z" class="note note-box" fill="#EDF2AE" stroke="#666" stroke-width="1"/>
      <path d="M 609 212 L 609 220 L 617 220" class="note" fill="none" stroke-width="1"/>
      <text x="567" y="238" class="note-text" text-anchor="middle" font-size="16">Rational thoughts</text>
      <text x="567" y="257" class="note-text" text-anchor="middle" font-size="16">prevail...</text>
    </g>
    <g class="actor">
      <rect x="0" y="393" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1" fill="#eaeaea" stroke="#666"/>
      <text x="75" y="425.5" class="actor actor-box" font-size="16" text-anchor="middle" dominant-baseline="central">Alice</text>
    </g>
    <g class="actor">
      <rect x="211" y="393" width="150" height="65" rx="3" ry="3" class="actor actor-box" fill="#eaeaea" stroke-width="1" stroke="#666"/>
      <text x="286" y="425.5" class="actor actor-box" dominant-baseline="central" text-anchor="middle" font-size="16">Bob</text>
    </g>
    <g class="actor">
      <rect x="422" y="393" width="150" height="65" rx="3" ry="3" class="actor actor-box" fill="#eaeaea" stroke="#666" stroke-width="1"/>
      <text x="497" y="425.5" class="actor actor-box" font-size="16" dominant-baseline="central" text-anchor="middle">John</text>
    </g>
  </g>
</svg>
