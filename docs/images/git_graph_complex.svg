  .tag-label { font-size: 10px; fill: #131300; }
  .tag-label-bkg { fill: #ECECFF; stroke: #c7c7f1; }
  .tag-hole { fill: #333333; }
  .commit-merge {
    stroke: #ECECFF;
    fill: #ECECFF;
  }
  .commit-reverse {
    stroke: #ECECFF;
    fill: #ECECFF;
    stroke-width: 3;
  }
  .commit-highlight-inner {
    stroke: #ECECFF;
    fill: #ECECFF;
  }
  .arrow { stroke-width: 8; stroke-linecap: round; fill: none }
  .gitTitleText {
    text-anchor: middle;
    font-size: 18px;
    fill: #333333;
