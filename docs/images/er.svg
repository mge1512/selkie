  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.edge-label-bg {
  fill: rgba(232, 232, 232, 0.8);
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.er-title {
  fill: #333333;
}

.entity-box {
  fill: #ECECFF;
  stroke: #9370DB;
}

.entity-header {
  fill: #9370DB;
  stroke: #9370DB;
}

.entity-name {
  fill: #333333;
  font-weight: bold;
}

.entity-attr {
  fill: #333333;
}

.relationshipLine {
  stroke: #333333;
  stroke-width: 1;
  fill: none;
}

.relationship-label {
  fill: #333333;
}

.relationship-label-background {
  fill: #ffffff;
  opacity: 0.7;
}

.marker {
  fill: none;
  stroke: #333333;
  stroke-width: 1;
}

.marker circle {
  fill: #ffffff;
}

.row-rect-odd {
  fill: #ffffff;
}

.row-rect-even {
  fill: #ECECFF;
}

.divider {
  stroke: #9370DB;
}

  </style>
