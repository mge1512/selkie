<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="480" height="558" viewBox="0 0 480 558" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 12px;
}

.edge-label-bg {
  fill: #ffffff;
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.er-title {
  fill: #333333;
}

.entity-box {
  fill: #ECECFF;
  stroke: #333333;
}

.entity-header {
  fill: #9370DB;
  stroke: #333333;
}

.entity-name {
  fill: #FFFFFF;
  font-weight: bold;
}

.entity-attr {
  fill: #333333;
}

.relationshipLine {
  stroke: #333333;
  stroke-width: 1;
  fill: none;
}

.relationship-label {
  fill: #333333;
}

.marker {
  fill: none;
  stroke: #333333;
  stroke-width: 1;
}

.marker circle {
  fill: white;
}

  </style>
