<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="764" height="450" viewBox="0 0 764 450" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.edge-label-bg {
  fill: rgba(232, 232, 232, 0.8);
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.pieCircle {
  stroke: black;
  stroke-width: 2px;
  opacity: 0.7;
}

.pieOuterCircle {
  stroke: black;
  stroke-width: 2px;
  fill: none;
}

.pieTitleText {
  text-anchor: middle;
  font-size: 25px;
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.slice {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  fill: #333333;
  font-size: 17px;
}

.legend text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 17px;
}

  </style>
  <g class="root">
    <g class="clusters">

    </g>
    <g class="edgePaths">

    </g>
    <g class="edgeLabels">

    </g>
    <g class="nodes">

    </g>
    <circle cx="225" cy="225" r="186" class="pieOuterCircle" fill="none" stroke="black" stroke-width="2"/>
    <path d="M 225 225 L 225 40 A 185 185 0 1 1 116.25972832589245 75.33185604063473 Z" class="pieCircle" fill="#ececff" stroke-width="2" opacity="0.7" stroke="black"/>
    <path d="M 225 225 L 116.25972832589245 75.33185604063473 A 185 185 0 0 1 224.99999999999997 40 Z" class="pieCircle" stroke="black" fill="#ffffde" opacity="0.7" stroke-width="2"/>
    <text x="225" y="25" class="pie-title" font-weight="bold" font-size="20" text-anchor="middle">NETFLIX</text>
    <text x="267.87610796952396" y="356.9590916359525" class="slice" text-anchor="middle" dominant-baseline="middle" font-size="17">90%</text>
    <text x="182.12389203047604" y="93.04090836404745" class="slice" dominant-baseline="middle" text-anchor="middle" font-size="17">10%</text>
    <g class="legend">
      <rect x="441" y="203" width="18" height="18" class="legend" fill="#ececff" stroke="#ececff"/>
      <rect x="441" y="225" width="18" height="18" class="legend" stroke="#ffffde" fill="#ffffde"/>
      <text x="463" y="217" class="legend" font-size="17">Time spent looking for movie</text>
      <text x="463" y="239" class="legend" font-size="17">Time spent watching it</text>
    </g>
  </g>
</svg>
