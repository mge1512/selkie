<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="450" height="390" viewBox="0 0 450 390" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 12px;
}

.edge-label-bg {
  fill: #ffffff;
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.sequence-title {
  fill: #333333;
}

.actor {
  stroke: #9370DB;
  fill: #ECECFF;
}

.actor-box {
  stroke: #9370DB;
  fill: #ECECFF;
}

/* Actor text - no stroke (avoid outlined appearance) */
text.actor, text.actor > tspan, text.actor-box, text.actor-label {
  fill: #333333;
  stroke: none;
}

.actor-line {
  stroke: #333333;
  stroke-width: 0.5px;
}

.messageLine0 {
  stroke-width: 1.5;
  stroke-dasharray: none;
  stroke: #333333;
}

.messageLine1 {
  stroke-width: 1.5;
  stroke-dasharray: 2, 2;
  stroke: #333333;
}

.message-line {
  stroke: #333333;
}

.messageText {
  fill: #333333;
  stroke: none;
}

.message-label {
  fill: #333333;
  stroke: none;
}

.note {
  stroke: #aaaa33;
  fill: #FFFFCC;
}

.noteText, .noteText > tspan {
  fill: #333333;
  stroke: none;
}

.note-text, .note-text > tspan {
  fill: #333333;
  stroke: none;
}

.activation {
  fill: #eaeaea;
  stroke: #333333;
}

.loopLine {
  stroke: #9370DB;
  fill: none;
  stroke-width: 2px;
  stroke-dasharray: 2, 2;
}

.loopText {
  fill: #333333;
}

.labelBox {
  stroke: #9370DB;
  fill: #ECECFF;
}

.sequence-marker-filled {
  fill: #333333;
  stroke: #333333;
}

.sequence-marker-open {
  fill: none;
  stroke: #333333;
}

.sequence-marker-cross {
  stroke: #333333;
}

  </style>
  <defs>
    <marker id="arrow-filled" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="sequence-marker-filled" stroke-width="1"/>
    </marker>
    <marker id="arrow-open" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10" class="sequence-marker-open" stroke-width="1"/>
    </marker>
    <marker id="arrow-cross" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <line x1="0" y1="0" x2="10" y2="10" class="sequence-marker-cross" stroke-width="2"/>
      <line x1="10" y1="0" x2="0" y2="10" class="sequence-marker-cross" stroke-width="2"/>
    </marker>
  </defs>
  <g class="root">
    <g class="clusters">

    </g>
    <g class="edgePaths">

    </g>
    <g class="edgeLabels">

    </g>
    <g class="nodes">

    </g>
    <g class="actor">
      <rect x="50" y="10" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1"/>
      <text x="125" y="42.5" class="actor actor-box" text-anchor="middle" dominant-baseline="central" font-size="16">Alice</text>
    </g>
    <line x1="125" y1="75" x2="125" y2="315" class="actor-line" stroke-width="0.5px"/>
    <g class="actor">
      <rect x="50" y="315" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1"/>
      <text x="125" y="347.5" class="actor actor-box" font-size="16" text-anchor="middle" dominant-baseline="central">Alice</text>
    </g>
    <g class="actor">
      <rect x="250" y="10" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1"/>
      <text x="325" y="42.5" class="actor actor-box" text-anchor="middle" dominant-baseline="central" font-size="16">Bob</text>
    </g>
    <line x1="325" y1="75" x2="325" y2="315" class="actor-line" stroke-width="0.5px"/>
    <g class="actor">
      <rect x="250" y="315" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1"/>
      <text x="325" y="347.5" class="actor actor-box" text-anchor="middle" dominant-baseline="central" font-size="16">Bob</text>
    </g>
    <g class="message">
      <line x1="125" y1="119" x2="325" y2="119" class="message-line" marker-end="url(#arrow-filled)" stroke-width="1"/>
      <text x="225" y="109" class="message-label" text-anchor="middle" font-size="16">Hello Bob!</text>
    </g>
    <g class="message">
      <line x1="325" y1="163" x2="125" y2="163" class="message-line" stroke-dasharray="5,5" stroke-width="1" marker-end="url(#arrow-filled)"/>
      <text x="225" y="153" class="message-label" font-size="16" text-anchor="middle">Hi Alice!</text>
    </g>
    <g class="message">
      <line x1="125" y1="207" x2="325" y2="207" class="message-line" marker-end="url(#arrow-filled)" stroke-width="1"/>
      <text x="225" y="197" class="message-label" font-size="16" text-anchor="middle">How are you?</text>
    </g>
    <g class="message">
      <line x1="325" y1="251" x2="125" y2="251" class="message-line" marker-end="url(#arrow-filled)" stroke-dasharray="5,5" stroke-width="1"/>
      <text x="225" y="241" class="message-label" font-size="16" text-anchor="middle">Great!</text>
    </g>
  </g>
</svg>
