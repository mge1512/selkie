      <line x1="450" y1="823" x2="1200" y2="823" class="loopLine" stroke-dasharray="3,3"/>
      <rect x="450" y="669" width="750" height="220" rx="3" ry="3" class="loopLine" fill="none"/>
      <rect x="450" y="977" width="750" height="132" rx="3" ry="3" class="loopLine" fill="none"/>
      <rect x="40" y="449" width="1170" height="836" rx="3" ry="3" class="loopLine" fill="none"/>
    </g>
    <g class="edgePaths">

    </g>
    <g class="edgeLabels">

    </g>
    <g class="nodes">

    </g>
    <g class="actor">
      <rect x="50" y="10" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1"/>
      <text x="125" y="42.5" class="actor actor-box" font-size="16" dominant-baseline="central" text-anchor="middle">User</text>
    </g>
    <line x1="125" y1="75" x2="125" y2="1591" class="actor-line" stroke-width="0.5px"/>
    <g class="actor">
      <rect x="50" y="1591" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1"/>
      <text x="125" y="1623.5" class="actor actor-box" font-size="16" text-anchor="middle" dominant-baseline="central">User</text>
    </g>
    <g class="actor">
      <rect x="250" y="10" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1"/>
      <text x="325" y="42.5" class="actor actor-box" text-anchor="middle" font-size="16" dominant-baseline="central">Browser</text>
    </g>
    <line x1="325" y1="75" x2="325" y2="1591" class="actor-line" stroke-width="0.5px"/>
    <g class="actor">
      <rect x="250" y="1591" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1"/>
      <text x="325" y="1623.5" class="actor actor-box" dominant-baseline="central" font-size="16" text-anchor="middle">Browser</text>
    </g>
    <g class="actor">
      <rect x="450" y="10" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1"/>
      <text x="525" y="42.5" class="actor actor-box" font-size="16" text-anchor="middle" dominant-baseline="central">API</text>
    </g>
    <line x1="525" y1="75" x2="525" y2="1591" class="actor-line" stroke-width="0.5px"/>
    <g class="actor">
      <rect x="450" y="1591" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1"/>
      <text x="525" y="1623.5" class="actor actor-box" dominant-baseline="central" font-size="16" text-anchor="middle">API</text>
    </g>
    <g class="actor">
      <rect x="650" y="10" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1"/>
      <text x="725" y="42.5" class="actor actor-box" text-anchor="middle" dominant-baseline="central" font-size="16">Auth</text>
    </g>
    <line x1="725" y1="75" x2="725" y2="1591" class="actor-line" stroke-width="0.5px"/>
    <g class="actor">
      <rect x="650" y="1591" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1"/>
      <text x="725" y="1623.5" class="actor actor-box" text-anchor="middle" dominant-baseline="central" font-size="16">Auth</text>
    </g>
    <g class="actor">
      <rect x="850" y="10" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1"/>
      <text x="925" y="42.5" class="actor actor-box" font-size="16" text-anchor="middle" dominant-baseline="central">DB</text>
    </g>
    <line x1="925" y1="75" x2="925" y2="1591" class="actor-line" stroke-width="0.5px"/>
    <g class="actor">
      <rect x="850" y="1591" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1"/>
      <text x="925" y="1623.5" class="actor actor-box" dominant-baseline="central" font-size="16" text-anchor="middle">DB</text>
    </g>
    <g class="actor">
      <rect x="1050" y="10" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1"/>
      <text x="1125" y="42.5" class="actor actor-box" text-anchor="middle" dominant-baseline="central" font-size="16">Queue</text>
    </g>
    <line x1="1125" y1="75" x2="1125" y2="1591" class="actor-line" stroke-width="0.5px"/>
    <g class="actor">
