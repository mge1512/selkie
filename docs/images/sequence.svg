<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="650" height="532" viewBox="-50 -10 650 532" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.edge-label-bg {
  fill: rgba(232, 232, 232, 0.8);
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.sequence-title {
  fill: #333333;
}

.actor {
  stroke: #9370DB;
  fill: #ECECFF;
}

.actor-box {
  stroke: #9370DB;
  fill: #ECECFF;
}

/* Actor text - no stroke (avoid outlined appearance) */
text.actor, text.actor > tspan, text.actor-box, text.actor-label {
  fill: #333333;
  stroke: none;
}

.actor-line {
  stroke: #999999;
  stroke-width: 0.5px;
}

.messageLine0 {
  stroke-width: 1.5;
  stroke-dasharray: none;
  stroke: #333333;
}

.messageLine1 {
  stroke-width: 1.5;
  stroke-dasharray: 2, 2;
  stroke: #333333;
}

.message-line {
  stroke: #333333;
}

.messageText {
  fill: #333333;
  stroke: none;
}

.message-label {
  fill: #333333;
  stroke: none;
}

.note {
  stroke: #aaaa33;
  fill: #FFFFCC;
}

.noteText, .noteText > tspan {
  fill: #333333;
  stroke: none;
}

.note-text, .note-text > tspan {
  fill: #333333;
  stroke: none;
}

.activation {
  fill: #f4f4f4;
  stroke: #666666;
}

.loopLine {
  stroke: #9370DB;
  fill: none;
  stroke-width: 2px;
  stroke-dasharray: 2, 2;
}

.loopText {
  fill: #333333;
}

.labelBox {
  stroke: #9370DB;
  fill: #ECECFF;
}

.sequence-marker-filled {
  fill: #333333;
  stroke: #333333;
}

.sequence-marker-open {
  fill: none;
  stroke: #333333;
}

.sequence-marker-cross {
  stroke: #333333;
}

.sequence-number {
  fill: #333333;
}

.sequenceNumber-circle {
  fill: #333333;
  stroke: #333333;
}

.sequenceNumber {
  fill: white;
}

  </style>
  <defs>
    <marker id="arrow-filled" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="sequence-marker-filled" stroke-width="1"/>
    </marker>
    <marker id="arrow-open" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10" class="sequence-marker-open" stroke-width="1"/>
    </marker>
    <marker id="arrow-cross" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="12" markerHeight="12" orient="auto">
      <line x1="0" y1="0" x2="10" y2="10" class="sequence-marker-cross" stroke-width="2"/>
      <line x1="10" y1="0" x2="0" y2="10" class="sequence-marker-cross" stroke-width="2"/>
    </marker>
    <marker id="sequencenumber" refX="15" refY="15" markerWidth="60" markerHeight="40" orient="auto">
      <circle cx="15" cy="15" r="6" class="sequence-number"/>
    </marker>
  </defs>
  <g class="root">
    <g class="clusters">
      <line x1="75" y1="65" x2="75" y2="447" class="actor-line" stroke-width="0.5px"/>
      <line x1="275" y1="65" x2="275" y2="447" class="actor-line" stroke-width="0.5px"/>
      <line x1="475" y1="65" x2="475" y2="447" class="actor-line" stroke-width="0.5px"/>
      <rect x="470" y="246" width="10" height="44" rx="1" ry="1" class="activation"/>
    </g>
    <g class="edgePaths">
      <line x1="75" y1="109" x2="275" y2="109" class="message-line" marker-end="url(#arrow-filled)" stroke-width="1.5"/>
      <line x1="275" y1="153" x2="75" y2="153" class="message-line" marker-end="url(#arrow-filled)" stroke-width="1.5" stroke-dasharray="3,3"/>
      <line x1="75" y1="246" x2="475" y2="246" class="message-line" marker-end="url(#arrow-filled)" stroke-width="1.5"/>
      <line x1="475" y1="290" x2="75" y2="290" class="message-line" stroke-dasharray="3,3" marker-end="url(#arrow-filled)" stroke-width="1.5"/>
      <line x1="75" y1="334" x2="275" y2="334" class="message-line" marker-end="url(#arrow-filled)" stroke-width="1.5"/>
      <line x1="275" y1="378" x2="75" y2="378" class="message-line" stroke-width="1.5" marker-end="url(#arrow-filled)" stroke-dasharray="3,3"/>
    </g>
    <g class="edgeLabels">
      <text x="175" y="99" class="message-label" text-anchor="middle" font-size="16">Hello Bob!</text>
      <text x="175" y="143" class="message-label" text-anchor="middle" font-size="16">Hi Alice!</text>
      <text x="275" y="236" class="message-label" font-size="16" text-anchor="middle">Login request</text>
      <text x="275" y="280" class="message-label" text-anchor="middle" font-size="16">Token</text>
      <text x="175" y="324" class="message-label" text-anchor="middle" font-size="16">How are you?</text>
      <text x="175" y="368" class="message-label" font-size="16" text-anchor="middle">I&apos;m good, thanks!</text>
    </g>
    <g class="nodes">

    </g>
    <g class="actor">
      <rect x="0" y="0" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke="#666" stroke-width="1" fill="#eaeaea"/>
      <text x="75" y="32.5" class="actor actor-box" text-anchor="middle" dominant-baseline="central" font-size="16">Alice</text>
    </g>
    <g class="actor">
      <rect x="200" y="0" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1" fill="#eaeaea" stroke="#666"/>
      <text x="275" y="32.5" class="actor actor-box" dominant-baseline="central" text-anchor="middle" font-size="16">Bob</text>
    </g>
    <g class="actor">
      <rect x="400" y="0" width="150" height="65" rx="3" ry="3" class="actor actor-box" fill="#eaeaea" stroke="#666" stroke-width="1"/>
      <text x="475" y="32.5" class="actor actor-box" font-size="16" dominant-baseline="central" text-anchor="middle">Server</text>
    </g>
    <g class="note">
      <rect x="50" y="163" width="250" height="39" class="note" fill="#EDF2AE" stroke="#666"/>
      <text x="175" y="168" class="noteText" dy="1em" dominant-baseline="middle" text-anchor="middle" alignment-baseline="middle" font-size="16">Authentication</text>
    </g>
    <g class="note">
      <rect x="300" y="388" width="150" height="39" class="note" stroke="#666" fill="#EDF2AE"/>
      <text x="375" y="393" class="noteText" font-size="16" text-anchor="middle" alignment-baseline="middle" dy="1em" dominant-baseline="middle">Bob thinks</text>
    </g>
    <g class="actor">
      <rect x="0" y="447" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke="#666" stroke-width="1" fill="#eaeaea"/>
      <text x="75" y="479.5" class="actor actor-box" dominant-baseline="central" text-anchor="middle" font-size="16">Alice</text>
    </g>
    <g class="actor">
      <rect x="200" y="447" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1" fill="#eaeaea" stroke="#666"/>
      <text x="275" y="479.5" class="actor actor-box" font-size="16" text-anchor="middle" dominant-baseline="central">Bob</text>
    </g>
    <g class="actor">
      <rect x="400" y="447" width="150" height="65" rx="3" ry="3" class="actor actor-box" fill="#eaeaea" stroke="#666" stroke-width="1"/>
      <text x="475" y="479.5" class="actor actor-box" dominant-baseline="central" font-size="16" text-anchor="middle">Server</text>
    </g>
  </g>
</svg>
