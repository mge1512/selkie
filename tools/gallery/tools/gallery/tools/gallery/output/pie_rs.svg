<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="450" viewBox="0 0 600 450" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 12px;
}

.edge-label-bg {
  fill: #ffffff;
}

.subgraph {
  fill: #fafafa;
  stroke: #9370DB;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #fafafa;
  stroke: #9370DB;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.pieCircle {
  stroke: black;
  stroke-width: 2px;
  opacity: 0.7;
}

.pieOuterCircle {
  stroke: black;
  stroke-width: 2px;
  fill: none;
}

.pieTitleText {
  text-anchor: middle;
  font-size: 25px;
  fill: black;
  font-family: "trebuchet ms", verdana, arial, sans-serif;
}

.slice {
  font-family: "trebuchet ms", verdana, arial, sans-serif;
  fill: #333;
  font-size: 17px;
}

.legend text {
  fill: black;
  font-family: "trebuchet ms", verdana, arial, sans-serif;
  font-size: 17px;
}

  </style>
  <g class="root">
    <text x="210" y="25" class="pie-title" text-anchor="middle" font-size="20" font-weight="bold">Project Distribution</text>
    <circle cx="210" cy="245" r="186" class="pieOuterCircle" fill="none" stroke="black" stroke-width="2"/>
    <path d="M 210 245 L 210 60 A 185 185 0 0 1 318.74027167410753 394.66814395936524 Z" class="pieCircle" opacity="0.7" fill="#ECECFF" stroke-width="2" stroke="black"/>
    <text x="341.9590916359525" y="202.12389203047604" class="slice" text-anchor="middle" font-size="17" dominant-baseline="middle">40%</text>
    <path d="M 210 245 L 318.74027167410753 394.66814395936524 A 185 185 0 0 1 60.33185604063473 353.74027167410753 Z" class="pieCircle" opacity="0.7" fill="#ffffde" stroke="black" stroke-width="2"/>
    <text x="188.29471797566796" y="382.04175725757534" class="slice" text-anchor="middle" dominant-baseline="middle" font-size="17">25%</text>
    <path d="M 210 245 L 60.33185604063473 353.74027167410753 A 185 185 0 0 1 60.33185604063473 136.2597283258925 Z" class="pieCircle" stroke-width="2" fill="#b5ff20" opacity="0.7" stroke="black"/>
    <text x="71.25" y="245.00000000000003" class="slice" font-size="17" dominant-baseline="middle" text-anchor="middle">20%</text>
    <path d="M 210 245 L 60.33185604063473 136.2597283258925 A 185 185 0 0 1 209.99999999999997 60 Z" class="pieCircle" stroke-width="2" fill="#b9b9ff" stroke="black" opacity="0.7"/>
    <text x="147.00881816113787" y="121.37284476886397" class="slice" text-anchor="middle" dominant-baseline="middle" font-size="17">15%</text>
    <g class="legend">
      <rect x="430" y="175" width="18" height="18" class="legend" stroke="#ECECFF" fill="#ECECFF"/>
      <text x="452" y="189" class="legend" font-size="17">Development</text>
      <rect x="430" y="197" width="18" height="18" class="legend" stroke="#ffffde" fill="#ffffde"/>
      <text x="452" y="211" class="legend" font-size="17">Testing</text>
      <rect x="430" y="219" width="18" height="18" class="legend" fill="#b9b9ff" stroke="#b9b9ff"/>
      <text x="452" y="233" class="legend" font-size="17">Documentation</text>
      <rect x="430" y="241" width="18" height="18" class="legend" fill="#b5ff20" stroke="#b5ff20"/>
      <text x="452" y="255" class="legend" font-size="17">Design</text>
    </g>
  </g>
</svg>
