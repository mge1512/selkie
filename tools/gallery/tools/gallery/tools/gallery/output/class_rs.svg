<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="626" viewBox="0 0 760 626" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 12px;
}

.edge-label-bg {
  fill: #ffffff;
}

.subgraph {
  fill: #fafafa;
  stroke: #9370DB;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #fafafa;
  stroke: #9370DB;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.class-box {
  fill: #ECECFF;
  stroke: #333333;
}

.class-name {
  fill: #333333;
  font-weight: bold;
}

.class-annotation {
  fill: #666666;
  font-style: italic;
}

.class-member {
  fill: #333333;
}

.class-method {
  fill: #333333;
}

.relation-line {
  stroke: #333333;
}

.relation-label {
  fill: #333333;
}

.note-box {
  fill: #FFFFCC;
  stroke: #333333;
}

.note-text {
  fill: #333333;
}

  </style>
  <defs>
    <marker id="inheritance" viewBox="0 0 20 14" refX="18" refY="7" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 1 7 L 18 13 V 1 Z" stroke="#333333" fill="none" stroke-width="1"/>
    </marker>
    <marker id="aggregation" viewBox="0 0 20 14" refX="18" refY="7" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 18 7 L 9 13 L 1 7 L 9 1 Z" fill="none" stroke="#333333" stroke-width="1"/>
    </marker>
    <marker id="composition" viewBox="0 0 20 14" refX="18" refY="7" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 18 7 L 9 13 L 1 7 L 9 1 Z" fill="#333333" stroke-width="1" stroke="#333333"/>
    </marker>
    <marker id="dependency" viewBox="0 0 20 20" refX="20" refY="10" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 20 10 L 0 20" stroke-width="1" fill="none" stroke="#333333"/>
    </marker>
    <marker id="lollipop" viewBox="0 0 20 20" refX="10" refY="10" markerWidth="10" markerHeight="10" orient="auto">
      <circle cx="10" cy="10" r="8" stroke="#333333" stroke-width="1" fill="#FFFFFF"/>
    </marker>
  </defs>
  <g class="root">
    <g class="class-node" id="class-Duck">
      <rect x="50" y="252" width="180" height="104" rx="3" ry="3" class="class-box" stroke="#333333" stroke-width="1" fill="#ECECFF"/>
      <text x="140" y="272" class="class-name" text-anchor="middle" font-weight="bold" font-size="14">Duck</text>
      <line x1="50" y1="282" x2="230" y2="282" stroke-width="1" stroke="#333333"/>
      <text x="60" y="306" class="class-member" font-size="12" text-anchor="start">+String beakColor</text>
      <line x1="50" y1="315" x2="230" y2="315" stroke="#333333" stroke-width="1"/>
      <text x="60" y="329" class="class-method" text-anchor="start" font-size="12">+swim()</text>
      <text x="60" y="347" class="class-method" font-size="12" text-anchor="start">+quack()</text>
    </g>
    <g class="class-node" id="class-Zebra">
      <rect x="530" y="252" width="180" height="86" rx="3" ry="3" class="class-box" fill="#ECECFF" stroke="#333333" stroke-width="1"/>
      <text x="620" y="272" class="class-name" font-size="14" text-anchor="middle" font-weight="bold">Zebra</text>
      <line x1="530" y1="282" x2="710" y2="282" stroke="#333333" stroke-width="1"/>
      <text x="540" y="306" class="class-member" font-size="12" text-anchor="start">+bool is_wild</text>
      <line x1="530" y1="315" x2="710" y2="315" stroke-width="1" stroke="#333333"/>
      <text x="540" y="329" class="class-method" text-anchor="start" font-size="12">+run()</text>
    </g>
    <g class="class-node" id="class-Egg">
      <rect x="50" y="436" width="180" height="60" rx="3" ry="3" class="class-box" fill="#ECECFF" stroke-width="1" stroke="#333333"/>
      <text x="140" y="456" class="class-name" font-weight="bold" text-anchor="middle" font-size="14">Egg</text>
    </g>
    <g class="class-node" id="class-Animal">
      <rect x="50" y="50" width="180" height="122" rx="3" ry="3" class="class-box" stroke-width="1" fill="#ECECFF" stroke="#333333"/>
      <text x="140" y="70" class="class-name" font-weight="bold" text-anchor="middle" font-size="14">Animal</text>
      <line x1="50" y1="80" x2="230" y2="80" stroke-width="1" stroke="#333333"/>
      <text x="60" y="104" class="class-member" text-anchor="start" font-size="12">+int age</text>
      <text x="60" y="122" class="class-member" font-size="12" text-anchor="start">+String gender</text>
      <line x1="50" y1="131" x2="230" y2="131" stroke-width="1" stroke="#333333"/>
      <text x="60" y="145" class="class-method" font-size="12" text-anchor="start">+isMammal()</text>
      <text x="60" y="163" class="class-method" text-anchor="start" font-size="12">+mate()</text>
    </g>
    <g class="class-node" id="class-Fish">
      <rect x="290" y="252" width="180" height="86" rx="3" ry="3" class="class-box" stroke-width="1" fill="#ECECFF" stroke="#333333"/>
      <text x="380" y="272" class="class-name" font-weight="bold" text-anchor="middle" font-size="14">Fish</text>
      <line x1="290" y1="282" x2="470" y2="282" stroke="#333333" stroke-width="1"/>
      <text x="300" y="306" class="class-member" font-size="12" text-anchor="start">-int sizeInFeet</text>
      <line x1="290" y1="315" x2="470" y2="315" stroke="#333333" stroke-width="1"/>
      <text x="300" y="329" class="class-method" text-anchor="start" font-size="12">-canEat()</text>
    </g>
    <g class="relation">
      <line x1="140" y1="172" x2="140" y2="252" class="relation-line" marker-start="url(#inheritance)" stroke-width="1" fill="none" stroke="#333333"/>
    </g>
    <g class="relation">
      <line x1="230" y1="111" x2="290" y2="295" class="relation-line" stroke-width="1" stroke="#333333" marker-start="url(#inheritance)" fill="none"/>
    </g>
    <g class="relation">
      <line x1="230" y1="111" x2="530" y2="295" class="relation-line" fill="none" stroke-width="1" stroke="#333333" marker-start="url(#inheritance)"/>
    </g>
    <g class="relation">
      <line x1="140" y1="356" x2="140" y2="436" class="relation-line" stroke-width="1" fill="none" stroke="#333333" marker-start="url(#composition)"/>
      <text x="140" y="391" class="relation-label" text-anchor="middle" font-size="11">has</text>
    </g>
  </g>
</svg>
