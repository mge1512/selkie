<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="650" height="566" viewBox="0 0 650 566" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 12px;
}

.edge-label-bg {
  fill: #ffffff;
}

.subgraph {
  fill: #fafafa;
  stroke: #9370DB;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #fafafa;
  stroke: #9370DB;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.sequence-title {
  fill: #333333;
}

.actor {
  stroke: #666;
  fill: #eaeaea;
}

/* Actor text - no stroke (avoid outlined appearance) */
text.actor, text.actor > tspan, text.actor-box, text.actor-label {
  fill: black;
  stroke: none;
}

.actor-line {
  stroke: #999;
  stroke-width: 0.5px;
}

.messageLine0 {
  stroke-width: 1.5;
  stroke-dasharray: none;
  stroke: #333;
}

.messageLine1 {
  stroke-width: 1.5;
  stroke-dasharray: 2, 2;
  stroke: #333;
}

.messageText {
  fill: #333;
  stroke: none;
}

.note {
  stroke: #aaaa33;
  fill: #fff5ad;
}

.noteText, .noteText > tspan {
  fill: black;
  stroke: none;
}

  </style>
  <defs>
    <marker id="arrow-filled" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333" stroke-width="1" stroke="#333333"/>
    </marker>
    <marker id="arrow-open" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10" stroke-width="1" stroke="#333333" fill="none"/>
    </marker>
    <marker id="arrow-cross" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <line x1="0" y1="0" x2="10" y2="10" stroke-width="2" stroke="#333333"/>
      <line x1="10" y1="0" x2="0" y2="10" stroke-width="2" stroke="#333333"/>
    </marker>
  </defs>
  <g class="root">
    <g class="actor">
      <rect x="50" y="10" width="150" height="65" rx="3" ry="3" class="actor actor-box" fill="#eaeaea" stroke-width="1" stroke="#666"/>
      <text x="125" y="42.5" class="actor actor-box" text-anchor="middle" font-size="16" dominant-baseline="central">Alice</text>
    </g>
    <line x1="125" y1="75" x2="125" y2="491" class="actor-line" stroke="#999" stroke-width="0.5"/>
    <g class="actor">
      <rect x="50" y="491" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke="#666" stroke-width="1" fill="#eaeaea"/>
      <text x="125" y="523.5" class="actor actor-box" text-anchor="middle" dominant-baseline="central" font-size="16">Alice</text>
    </g>
    <g class="actor">
      <rect x="250" y="10" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1" stroke="#666" fill="#eaeaea"/>
      <text x="325" y="42.5" class="actor actor-box" text-anchor="middle" dominant-baseline="central" font-size="16">Bob</text>
    </g>
    <line x1="325" y1="75" x2="325" y2="491" class="actor-line" stroke-width="0.5" stroke="#999"/>
    <g class="actor">
      <rect x="250" y="491" width="150" height="65" rx="3" ry="3" class="actor actor-box" fill="#eaeaea" stroke="#666" stroke-width="1"/>
      <text x="325" y="523.5" class="actor actor-box" text-anchor="middle" dominant-baseline="central" font-size="16">Bob</text>
    </g>
    <g class="actor">
      <rect x="450" y="10" width="150" height="65" rx="3" ry="3" class="actor actor-box" fill="#eaeaea" stroke="#666" stroke-width="1"/>
      <text x="525" y="42.5" class="actor actor-box" font-size="16" text-anchor="middle" dominant-baseline="central">Server</text>
    </g>
    <line x1="525" y1="75" x2="525" y2="491" class="actor-line" stroke="#999" stroke-width="0.5"/>
    <g class="actor">
      <rect x="450" y="491" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke="#666" fill="#eaeaea" stroke-width="1"/>
      <text x="525" y="523.5" class="actor actor-box" dominant-baseline="central" font-size="16" text-anchor="middle">Server</text>
    </g>
    <g class="message">
      <line x1="125" y1="119" x2="325" y2="119" class="message-line" stroke-width="1" marker-end="url(#arrow-filled)" stroke="#333333"/>
      <text x="225" y="109" class="message-label" text-anchor="middle" font-size="11">Hello Bob!</text>
    </g>
    <g class="message">
      <line x1="325" y1="163" x2="125" y2="163" class="message-line" stroke-width="1" marker-end="url(#arrow-filled)" stroke="#333333" stroke-dasharray="5,5"/>
      <text x="225" y="153" class="message-label" text-anchor="middle" font-size="11">Hi Alice!</text>
    </g>
    <g class="message">
      <line x1="125" y1="207" x2="525" y2="207" class="message-line" stroke-width="1" marker-end="url(#arrow-filled)" stroke="#333333"/>
      <text x="325" y="197" class="message-label" font-size="11" text-anchor="middle">Login request</text>
    </g>
    <g class="message">
      <line x1="525" y1="251" x2="125" y2="251" class="message-line" marker-end="url(#arrow-filled)" stroke="#333333" stroke-dasharray="5,5" stroke-width="1"/>
      <text x="325" y="241" class="message-label" text-anchor="middle" font-size="11">Token</text>
    </g>
    <g class="message">
      <line x1="125" y1="295" x2="325" y2="295" class="message-line" stroke="#333333" stroke-width="1" marker-end="url(#arrow-filled)"/>
      <text x="225" y="285" class="message-label" text-anchor="middle" font-size="11">How are you?</text>
    </g>
    <g class="message">
      <line x1="325" y1="339" x2="125" y2="339" class="message-line" stroke-width="1" stroke-dasharray="5,5" stroke="#333333" marker-end="url(#arrow-filled)"/>
      <text x="225" y="329" class="message-label" font-size="11" text-anchor="middle">I&apos;m good, thanks!</text>
    </g>
    <g class="note">
      <path d="M 75 97 L 167 97 L 175 105 L 175 137 L 75 137 Z" class="note-box" stroke="#333333" stroke-width="1" fill="#FFFFCC"/>
      <path d="M 167 97 L 167 105 L 175 105" stroke="#333333" stroke-width="1" fill="none"/>
      <text x="125" y="121" class="note-text" text-anchor="middle" font-size="11">Authentication</text>
    </g>
    <g class="note">
      <path d="M 345 97 L 437 97 L 445 105 L 445 137 L 345 137 Z" class="note-box" fill="#FFFFCC" stroke="#333333" stroke-width="1"/>
      <path d="M 437 97 L 437 105 L 445 105" stroke-width="1" stroke="#333333" fill="none"/>
      <text x="395" y="121" class="note-text" text-anchor="middle" font-size="11">Bob thinks</text>
    </g>
  </g>
</svg>
