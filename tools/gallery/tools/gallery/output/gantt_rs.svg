<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 12px;
}

.edge-label-bg {
  fill: #ffffff;
}

.subgraph {
  fill: #fafafa;
  stroke: #9370DB;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #fafafa;
  stroke: #9370DB;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.titleText {
  text-anchor: middle;
  font-size: 18px;
  fill: #333;
  font-family: "trebuchet ms", verdana, arial, sans-serif;
}

.section {
  stroke: none;
  opacity: 0.2;
}

.section0 {
  fill: rgba(102, 102, 255, 0.49);
}

.section1, .section3 {
  fill: white;
  opacity: 0.2;
}

.section2 {
  fill: #fff400;
}

.sectionTitle {
  text-anchor: start;
  font-family: "trebuchet ms", verdana, arial, sans-serif;
  fill: #333;
}

.task {
  stroke-width: 2;
}

.task0, .task1, .task2, .task3 {
  fill: #8a90dd;
  stroke: #534fbc;
}

.taskText {
  text-anchor: middle;
  font-family: "trebuchet ms", verdana, arial, sans-serif;
}

.taskText0, .taskText1, .taskText2, .taskText3 {
  fill: white;
}

.active0, .active1, .active2, .active3 {
  fill: #bfc7ff;
  stroke: #534fbc;
}

.activeText0, .activeText1, .activeText2, .activeText3 {
  fill: black !important;
}

.done0, .done1, .done2, .done3 {
  stroke: grey;
  fill: lightgrey;
  stroke-width: 2;
}

.doneText0, .doneText1, .doneText2, .doneText3 {
  fill: black !important;
}

.crit0, .crit1, .crit2, .crit3 {
  stroke: #ff8888;
  fill: red;
  stroke-width: 2;
}

.milestone {
  transform: rotate(45deg) scale(0.8, 0.8);
}

.grid .tick {
  stroke: lightgrey;
  opacity: 0.8;
  shape-rendering: crispEdges;
}

.grid path {
  stroke-width: 0;
}

.timeline-bg {
  fill: #f8f8f8;
}

.axis-label {
  fill: #666666;
}

  </style>
  <g class="root">
    <text x="550" y="70" class="gantt-title" font-size="18" text-anchor="middle" font-weight="bold">Project Timeline</text>
    <g class="timeline-axis">
      <rect x="150" y="90" width="900" height="40" class="timeline-bg" fill="#f8f8f8" stroke="#cccccc" stroke-width="1"/>
      <line x1="150" y1="130" x2="1050" y2="130" stroke-width="1" stroke="#333333"/>
      <line x1="150" y1="125" x2="150" y2="130" stroke-width="1" stroke="#333333"/>
      <text x="150" y="120" class="axis-label" font-size="9" text-anchor="middle">2024-01-01</text>
      <line x1="210" y1="125" x2="210" y2="130" stroke-width="1" stroke="#333333"/>
      <text x="210" y="120" class="axis-label" font-size="9" text-anchor="middle">2024-01-03</text>
      <line x1="270" y1="125" x2="270" y2="130" stroke="#333333" stroke-width="1"/>
      <text x="270" y="120" class="axis-label" font-size="9" text-anchor="middle">2024-01-05</text>
      <line x1="330" y1="125" x2="330" y2="130" stroke="#333333" stroke-width="1"/>
      <text x="330" y="120" class="axis-label" text-anchor="middle" font-size="9">2024-01-07</text>
      <line x1="390" y1="125" x2="390" y2="130" stroke="#333333" stroke-width="1"/>
      <text x="390" y="120" class="axis-label" font-size="9" text-anchor="middle">2024-01-09</text>
      <line x1="450" y1="125" x2="450" y2="130" stroke="#333333" stroke-width="1"/>
      <text x="450" y="120" class="axis-label" font-size="9" text-anchor="middle">2024-01-11</text>
      <line x1="510" y1="125" x2="510" y2="130" stroke-width="1" stroke="#333333"/>
      <text x="510" y="120" class="axis-label" font-size="9" text-anchor="middle">2024-01-13</text>
      <line x1="570" y1="125" x2="570" y2="130" stroke-width="1" stroke="#333333"/>
      <text x="570" y="120" class="axis-label" text-anchor="middle" font-size="9">2024-01-15</text>
      <line x1="630" y1="125" x2="630" y2="130" stroke-width="1" stroke="#333333"/>
      <text x="630" y="120" class="axis-label" font-size="9" text-anchor="middle">2024-01-17</text>
      <line x1="690" y1="125" x2="690" y2="130" stroke-width="1" stroke="#333333"/>
      <text x="690" y="120" class="axis-label" text-anchor="middle" font-size="9">2024-01-19</text>
      <line x1="750" y1="125" x2="750" y2="130" stroke="#333333" stroke-width="1"/>
      <text x="750" y="120" class="axis-label" font-size="9" text-anchor="middle">2024-01-21</text>
      <line x1="810" y1="125" x2="810" y2="130" stroke="#333333" stroke-width="1"/>
      <text x="810" y="120" class="axis-label" text-anchor="middle" font-size="9">2024-01-23</text>
      <line x1="870" y1="125" x2="870" y2="130" stroke-width="1" stroke="#333333"/>
      <text x="870" y="120" class="axis-label" font-size="9" text-anchor="middle">2024-01-25</text>
      <line x1="930" y1="125" x2="930" y2="130" stroke="#333333" stroke-width="1"/>
      <text x="930" y="120" class="axis-label" text-anchor="middle" font-size="9">2024-01-27</text>
      <line x1="990" y1="125" x2="990" y2="130" stroke-width="1" stroke="#333333"/>
      <text x="990" y="120" class="axis-label" text-anchor="middle" font-size="9">2024-01-29</text>
      <line x1="1050" y1="125" x2="1050" y2="130" stroke="#333333" stroke-width="1"/>
      <text x="1050" y="120" class="axis-label" text-anchor="middle" font-size="9">2024-01-31</text>
      <g class="grid">
        <line x1="150" y1="130" x2="150" y2="380" class="tick" stroke-width="1" stroke="#d3d3d3"/>
        <line x1="210" y1="130" x2="210" y2="380" class="tick" stroke-width="1" stroke="#d3d3d3"/>
        <line x1="270" y1="130" x2="270" y2="380" class="tick" stroke="#d3d3d3" stroke-width="1"/>
        <line x1="330" y1="130" x2="330" y2="380" class="tick" stroke-width="1" stroke="#d3d3d3"/>
        <line x1="390" y1="130" x2="390" y2="380" class="tick" stroke="#d3d3d3" stroke-width="1"/>
        <line x1="450" y1="130" x2="450" y2="380" class="tick" stroke-width="1" stroke="#d3d3d3"/>
        <line x1="510" y1="130" x2="510" y2="380" class="tick" stroke-width="1" stroke="#d3d3d3"/>
        <line x1="570" y1="130" x2="570" y2="380" class="tick" stroke-width="1" stroke="#d3d3d3"/>
        <line x1="630" y1="130" x2="630" y2="380" class="tick" stroke-width="1" stroke="#d3d3d3"/>
        <line x1="690" y1="130" x2="690" y2="380" class="tick" stroke="#d3d3d3" stroke-width="1"/>
        <line x1="750" y1="130" x2="750" y2="380" class="tick" stroke-width="1" stroke="#d3d3d3"/>
        <line x1="810" y1="130" x2="810" y2="380" class="tick" stroke-width="1" stroke="#d3d3d3"/>
        <line x1="870" y1="130" x2="870" y2="380" class="tick" stroke-width="1" stroke="#d3d3d3"/>
        <line x1="930" y1="130" x2="930" y2="380" class="tick" stroke-width="1" stroke="#d3d3d3"/>
        <line x1="990" y1="130" x2="990" y2="380" class="tick" stroke-width="1" stroke="#d3d3d3"/>
        <line x1="1050" y1="130" x2="1050" y2="380" class="tick" stroke="#d3d3d3" stroke-width="1"/>
      </g>
    </g>
    <text x="60" y="146.5" class="section-label" font-size="12" font-weight="bold" text-anchor="start">Planning</text>
    <rect x="150" y="157.5" width="210" height="20" rx="3" ry="3" class="task-bar" stroke="#534fbc" fill="#8a90dd" stroke-width="2"/>
    <text x="255" y="171.5" class="taskText taskText1" text-anchor="middle" font-size="11">Requirements</text>
    <rect x="360" y="182.5" width="150" height="20" rx="3" ry="3" class="task-bar" stroke-width="2" fill="#8a90dd" stroke="#534fbc"/>
    <text x="435" y="196.5" class="taskText taskText1" font-size="11" text-anchor="middle">Design</text>
    <rect x="50" y="130" width="1000" height="75" class="section section0" fill="rgba(102, 102, 255, 0.49)"/>
    <text x="60" y="221.5" class="section-label" text-anchor="start" font-size="12" font-weight="bold">Development</text>
    <rect x="510" y="232.5" width="300" height="20" rx="3" ry="3" class="task-bar" fill="#ff0000" stroke="#ff8888" stroke-width="2"/>
    <text x="660" y="246.5" class="taskText taskText2" font-size="11" text-anchor="middle">Backend</text>
    <rect x="510" y="257.5" width="240" height="20" rx="3" ry="3" class="task-bar" stroke="#534fbc" fill="#8a90dd" stroke-width="2"/>
    <text x="630" y="271.5" class="taskText taskText2" font-size="11" text-anchor="middle">Frontend</text>
    <rect x="810" y="282.5" width="90" height="20" rx="3" ry="3" class="task-bar" stroke-width="2" fill="#8a90dd" stroke="#534fbc"/>
    <text x="855" y="296.5" class="taskText taskText2" font-size="11" text-anchor="middle">API Integration</text>
    <rect x="50" y="205" width="1000" height="100" class="section section1" fill="rgba(255, 255, 255, 0.2)"/>
    <text x="60" y="321.5" class="section-label" font-weight="bold" text-anchor="start" font-size="12">Testing</text>
    <rect x="750" y="332.5" width="90" height="20" rx="3" ry="3" class="task-bar" stroke-width="2" stroke="#534fbc" fill="#8a90dd"/>
    <text x="795" y="346.5" class="taskText taskText3" text-anchor="middle" font-size="11">Unit Tests</text>
    <rect x="900" y="357.5" width="150" height="20" rx="3" ry="3" class="task-bar" fill="#8a90dd" stroke="#534fbc" stroke-width="2"/>
    <text x="975" y="371.5" class="taskText taskText3" text-anchor="middle" font-size="11">QA</text>
    <rect x="50" y="305" width="1000" height="75" class="section section2" fill="#fff400"/>
  </g>
</svg>
