<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="520" height="392" viewBox="0 0 520 392" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 12px;
}

.edge-label-bg {
  fill: #ffffff;
}

.subgraph {
  fill: #fafafa;
  stroke: #9370DB;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #fafafa;
  stroke: #9370DB;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.er-title {
  fill: #333333;
}

.entity-box {
  fill: #ECECFF;
  stroke: #333333;
}

.entity-header {
  fill: #9370DB;
  stroke: #333333;
}

.entity-name {
  fill: #FFFFFF;
  font-weight: bold;
}

.entity-attr {
  fill: #333333;
}

.relationship-line {
  stroke: #333333;
}

.relationship-label {
  fill: #333333;
}

.cardinality {
  stroke: #333333;
}

  </style>
