<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="620" height="240" viewBox="0 0 620 240" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 12px;
}

.edge-label-bg {
  fill: #ffffff;
}

.subgraph {
  fill: #fafafa;
  stroke: #9370DB;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #fafafa;
  stroke: #9370DB;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 14px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.state-title {
  fill: #333333;
}

.state-box {
  fill: #ECECFF;
  stroke: #333333;
}

.state-label {
  fill: #333333;
}

.state-description {
  fill: #666666;
}

.state-start {
  fill: #333333;
}

.state-end-outer {
  stroke: #333333;
}

.state-end-inner {
  fill: #333333;
}

.state-fork-join {
  fill: #333333;
}

.state-choice {
  fill: #ECECFF;
  stroke: #333333;
}

.state-divider {
  stroke: #333333;
  stroke-dasharray: 5, 5;
}

.transition-line {
  stroke: #333333;
}

.transition-label {
  fill: #333333;
}

.note-box {
  fill: #FFFFCC;
  stroke: #333333;
}

.note-text {
  fill: #333333;
}

  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" stroke-width="1" fill="#333333" stroke="#333333"/>
    </marker>
  </defs>
  <g class="root">
    <g class="state-node" id="state-Error">
      <rect x="50" y="50" width="120" height="40" rx="10" ry="10" class="state-box" stroke-width="1" stroke="#333333" fill="#ECECFF"/>
      <text x="110" y="75" class="state-label" text-anchor="middle" font-size="12">Error</text>
    </g>
    <g class="state-node" id="state-Idle">
      <rect x="250" y="50" width="120" height="40" rx="10" ry="10" class="state-box" fill="#ECECFF" stroke="#333333" stroke-width="1"/>
      <text x="310" y="75" class="state-label" font-size="12" text-anchor="middle">Idle</text>
    </g>
    <g class="state-node" id="state-Running">
      <rect x="450" y="50" width="120" height="40" rx="10" ry="10" class="state-box" stroke-width="1" fill="#ECECFF" stroke="#333333"/>
      <text x="510" y="75" class="state-label" text-anchor="middle" font-size="12">Running</text>
    </g>
    <g class="state-node" id="state-[*]_end_0">
      <circle cx="110" cy="170" r="12" class="state-end-outer" fill="none" stroke-width="2" stroke="#333333"/>
      <circle cx="110" cy="170" r="7.199999999999999" class="state-end-inner" fill="#333333"/>
    </g>
    <g class="state-node" id="state-[*]_start_0">
      <circle cx="310" cy="170" r="12" class="state-start" fill="#333333"/>
    </g>
    <g class="transition">
      <line x1="310" y1="158" x2="310" y2="90" class="transition-line" stroke="#333333" stroke-width="1" marker-end="url(#arrow)"/>
    </g>
    <g class="transition">
      <line x1="370" y1="70" x2="450" y2="70" class="transition-line" marker-end="url(#arrow)" stroke-width="1" stroke="#333333"/>
      <text x="410" y="65" class="transition-label" text-anchor="middle" font-size="11">start</text>
    </g>
    <g class="transition">
      <line x1="450" y1="70" x2="370" y2="70" class="transition-line" marker-end="url(#arrow)" stroke="#333333" stroke-width="1"/>
      <text x="410" y="65" class="transition-label" font-size="11" text-anchor="middle">stop</text>
    </g>
    <g class="transition">
      <line x1="450" y1="70" x2="170" y2="70" class="transition-line" marker-end="url(#arrow)" stroke-width="1" stroke="#333333"/>
      <text x="310" y="65" class="transition-label" font-size="11" text-anchor="middle">error</text>
    </g>
    <g class="transition">
      <line x1="170" y1="70" x2="250" y2="70" class="transition-line" marker-end="url(#arrow)" stroke="#333333" stroke-width="1"/>
      <text x="210" y="65" class="transition-label" font-size="11" text-anchor="middle">reset</text>
    </g>
    <g class="transition">
      <line x1="110" y1="90" x2="110" y2="158" class="transition-line" stroke-width="1" stroke="#333333" marker-end="url(#arrow)"/>
    </g>
  </g>
</svg>
