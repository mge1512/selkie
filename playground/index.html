<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selkie Playground - Mermaid Diagram Editor</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for mindmap and flowchart icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <div class="header-left">
            <img src="logo.png" alt="Selkie" class="logo">
            <div class="header-text">
                <h1>Selkie Playground</h1>
                <span class="subtitle">Fast Mermaid diagram rendering in Rust/WASM</span>
            </div>
        </div>
        <div class="header-right">
            <select id="theme-select" aria-label="Select theme">
                <option value="default">Default</option>
                <option value="dark">Dark</option>
                <option value="forest">Forest</option>
                <option value="neutral">Neutral</option>
                <option value="base">Base</option>
            </select>
            <select id="example-select" aria-label="Select example diagram">
                <option value="">-- Select Example --</option>
                <optgroup label="Basic">
                    <option value="flowchart-simple">Flowchart (Simple)</option>
                    <option value="sequence-simple">Sequence (Simple)</option>
                    <option value="class-simple">Class (Simple)</option>
                    <option value="state-simple">State (Simple)</option>
                    <option value="er-simple">ER (Simple)</option>
                    <option value="gantt-simple">Gantt (Simple)</option>
                    <option value="pie-simple">Pie (Simple)</option>
                    <option value="mindmap-simple">Mindmap (Simple)</option>
                </optgroup>
                <optgroup label="Complex">
                    <option value="flowchart-complex">Flowchart (Complex)</option>
                    <option value="sequence-complex">Sequence (Complex)</option>
                    <option value="class-complex">Class (Complex)</option>
                    <option value="state-complex">State (Complex)</option>
                    <option value="er-complex">ER (Complex)</option>
                    <option value="gantt-complex">Gantt (Complex)</option>
                    <option value="pie-complex">Pie (Complex)</option>
                    <option value="mindmap-complex">Mindmap (Complex)</option>
                </optgroup>
            </select>
            <a href="benchmark.html" class="nav-link" title="Performance Benchmark">Benchmark</a>
            <a href="eval/" class="nav-link" title="Eval Report">Eval</a>
            <a href="https://github.com/btucker/selkie" target="_blank" class="github-link">
                <svg height="24" width="24" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                </svg>
            </a>
        </div>
    </header>

    <main>
        <div class="pane editor-pane">
            <div class="pane-header">
                <span>Editor</span>
                <div class="render-info">
                    <span id="render-time"></span>
                </div>
            </div>
            <textarea id="editor" spellcheck="false" placeholder="Enter Mermaid diagram code..."></textarea>
        </div>
        <div class="divider" id="divider"></div>
        <div class="pane preview-pane">
            <div class="pane-header">
                <span>Preview</span>
                <div class="preview-actions">
                    <button id="zoom-in" title="Zoom In">+</button>
                    <button id="zoom-reset" title="Reset Zoom">100%</button>
                    <button id="zoom-out" title="Zoom Out">-</button>
                    <button id="download-svg" title="Download SVG">Download SVG</button>
                </div>
            </div>
            <div id="preview-container">
                <div id="preview"></div>
            </div>
            <div id="error-display" class="hidden"></div>
        </div>
    </main>

    <div id="loading-overlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <p>Loading Selkie WASM...</p>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
